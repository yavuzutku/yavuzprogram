<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Giriş Yap</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --panel: #12121a;
      --border: rgba(255,255,255,0.07);
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --text: #f0ede8;
      --muted: #7a7880;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: var(--text);
    }

    /* ─── Background ─── */
    .bg-layer {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(201,168,76,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 90%, rgba(100,80,180,0.07) 0%, transparent 55%),
        var(--bg);
    }
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black, transparent);
    }
    .orb {
      position: fixed; border-radius: 50%; filter: blur(90px); z-index: 0; pointer-events: none;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .orb-1 { width: 400px; height: 400px; background: rgba(201,168,76,0.07); top: -100px; right: -100px; }
    .orb-2 { width: 300px; height: 300px; background: rgba(120,80,200,0.06); bottom: -80px; left: -80px; animation-delay: -6s; }
    @keyframes drift { from { transform: translate(0,0) scale(1); } to { transform: translate(30px,20px) scale(1.05); } }

    /* ─── Card ─── */
    .card {
      position: relative; z-index: 10;
      width: 420px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 52px 48px;
      box-shadow: 0 40px 120px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.03);
      animation: rise 0.8s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(32px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ─── Logo ─── */
    .logo-wrap {
      display: flex; flex-direction: column; align-items: center; margin-bottom: 36px;
      animation: rise 0.8s 0.1s cubic-bezier(0.22,1,0.36,1) both;
    }
    .logo-icon {
      width: 56px; height: 56px; margin-bottom: 18px;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 32px rgba(201,168,76,0.25);
    }
    .logo-icon svg { width: 28px; height: 28px; }
    .logo-name {
      font-family: 'Playfair Display', serif;
      font-size: 26px; font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--text) 40%, var(--gold-light));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .logo-tagline {
      margin-top: 6px;
      font-size: 13px; color: var(--muted); letter-spacing: 0.3px;
    }

    /* ─── Divider ─── */
    .divider {
      display: flex; align-items: center; gap: 12px; margin-bottom: 28px;
      animation: rise 0.8s 0.2s cubic-bezier(0.22,1,0.36,1) both;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .divider span { font-size: 11px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; }

    /* ─── Google Button ─── */
    .google-btn-wrap {
      animation: rise 0.8s 0.3s cubic-bezier(0.22,1,0.36,1) both;
    }
    .google-btn {
      width: 100%; padding: 14px 20px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14.5px; font-weight: 500;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 12px;
      transition: background 0.2s, border-color 0.2s, transform 0.15s, box-shadow 0.2s;
      letter-spacing: 0.1px;
    }
    .google-btn:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.18);
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
    .google-btn:active { transform: translateY(0); }
    .google-btn svg { flex-shrink: 0; }

    /* ─── Footer ─── */
    .footer {
      margin-top: 32px; text-align: center;
      font-size: 12px; color: var(--muted); line-height: 1.7;
      animation: rise 0.8s 0.4s cubic-bezier(0.22,1,0.36,1) both;
    }
    .footer a { color: var(--gold); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }

    /* ─── User Panel (giriş sonrası) ─── */
    .user-panel {
      display: none;
      flex-direction: column; align-items: center; text-align: center; gap: 16px;
      animation: rise 0.7s cubic-bezier(0.22,1,0.36,1) both;
    }
    .user-avatar {
      width: 72px; height: 72px; border-radius: 50%;
      border: 2px solid var(--gold);
      box-shadow: 0 0 0 4px rgba(201,168,76,0.15);
    }
    .user-name {
      font-family: 'Playfair Display', serif;
      font-size: 22px; font-weight: 700;
    }
    .user-email { font-size: 13px; color: var(--muted); }
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(201,168,76,0.12);
      border: 1px solid rgba(201,168,76,0.25);
      color: var(--gold-light);
      padding: 6px 14px; border-radius: 100px;
      font-size: 12px; font-weight: 500;
    }
    .badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: #4caf50; }
    .signout-btn {
      margin-top: 8px; padding: 10px 28px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px; color: var(--muted);
      font-family: 'DM Sans', sans-serif; font-size: 13px;
      cursor: pointer; transition: all 0.2s;
    }
    .signout-btn:hover { border-color: rgba(255,255,255,0.15); color: var(--text); }
  </style>
</head>
<body>
  <div class="bg-layer"></div>
  <div class="bg-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="card">

    <!-- Giriş Ekranı -->
    <div id="login-view">
      <div class="logo-wrap">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#0a0a0f" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
          </svg>
        </div>
        <div class="logo-name">YavuzProgram</div>
        <div class="logo-tagline">Hesabına güvenle giriş yap</div>
      </div>

      <div class="divider"><span>Devam et</span></div>

      <div class="google-btn-wrap">
        <button class="google-btn" onclick="startGoogleLogin()">
          <!-- Google SVG logo -->
          <svg width="20" height="20" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.14 0 5.95 1.08 8.17 2.84l6.08-6.08C34.46 3.09 29.5 1 24 1 14.82 1 7.07 6.48 3.69 14.22l7.1 5.52C12.48 13.72 17.78 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.52 24.5c0-1.64-.15-3.22-.42-4.74H24v8.98h12.7c-.55 2.95-2.2 5.44-4.7 7.12l7.24 5.62C43.46 37.27 46.52 31.32 46.52 24.5z"/>
            <path fill="#FBBC05" d="M10.79 28.26A14.54 14.54 0 0 1 9.5 24c0-1.49.26-2.94.71-4.26L3.11 14.2A23.93 23.93 0 0 0 1 24c0 3.88.93 7.54 2.57 10.78l7.22-6.52z"/>
            <path fill="#34A853" d="M24 47c6.48 0 11.92-2.15 15.9-5.83l-7.24-5.62C30.54 37.32 27.46 38.5 24 38.5c-6.2 0-11.48-4.2-13.38-9.86l-7.18 6.52C7.02 41.5 14.78 47 24 47z"/>
            <path fill="none" d="M1 1h46v46H1z"/>
          </svg>
          Google ile Giriş Yap
        </button>
      </div>

      <div class="footer">
        Giriş yaparak <a href="#">Kullanım Koşulları</a>'nı ve<br>
        <a href="#">Gizlilik Politikası</a>'nı kabul etmiş olursunuz.
      </div>
    </div>

    <!-- Giriş Sonrası Ekran -->
    <div class="user-panel" id="user-view">
      <img id="user-avatar" src="" alt="Profil" class="user-avatar"/>
      <div>
        <div class="user-name" id="user-name"></div>
        <div class="user-email" id="user-email"></div>
      </div>
      <div class="badge">Giriş yapıldı</div>
      <button class="signout-btn" onclick="signOut()">Çıkış Yap</button>
    </div>

  </div>

  <!-- Hidden Google button for programmatic use -->
  <div id="g_id_onload"
    data-client_id="279266692579-pcrjmld03761be73i2pr6iis9evclm4q.apps.googleusercontent.com"
    data-callback="handleCredentialResponse"
    data-auto_prompt="false"
    style="display:none">
  </div>

  <script>
    function startGoogleLogin() {
      google.accounts.id.initialize({
        client_id: '279266692579-pcrjmld03761be73i2pr6iis9evclm4q.apps.googleusercontent.com',
        callback: handleCredentialResponse
      });
      google.accounts.id.prompt();
    }

    function handleCredentialResponse(response) {
      const payload = JSON.parse(atob(response.credential.split('.')[1]));

      document.getElementById('user-avatar').src = payload.picture;
      document.getElementById('user-name').textContent = payload.name;
      document.getElementById('user-email').textContent = payload.email;

      document.getElementById('login-view').style.display = 'none';
      const uv = document.getElementById('user-view');
      uv.style.display = 'flex';
    }

    function signOut() {
      google.accounts.id.disableAutoSelect();
      document.getElementById('user-view').style.display = 'none';
      document.getElementById('login-view').style.display = 'block';
    }
  </script>
</body>
</html>
