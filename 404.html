<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="/favicon.png">

<title>404 — Sayfa Bulunamadı | AlmancaPratik</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/global.css">

<style>
.page-404{
  position:relative;
  z-index:1;
  max-width:900px;
  margin:0 auto;
  padding:120px 24px;
}

.box{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:48px 40px;
  text-align:center;
}

.code{
  font-family:var(--fd);
  font-size:80px;
  font-weight:800;
  letter-spacing:-3px;
  margin-bottom:10px;
  background:linear-gradient(135deg,var(--gold),var(--gold-l));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.title{
  font-family:var(--fd);
  font-size:89px;
  font-weight:800;
  margin-bottom:10px;
}

.desc{
  font-size:25px;
  color:var(--t2);
  margin-bottom:28px;
  line-height:1.7;
}

.actions{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
}

/* senin buton stilinle uyumlu */
.btn-cta{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:12px 22px;
  background:linear-gradient(135deg,var(--gold),var(--gold-l));
  color:#0a0a0f;
  font-family:var(--fd);
  font-weight:800;
  border-radius:10px;
  text-decoration:none;
  transition:0.2s;
}

.btn-cta:hover{
  transform:translateY(-2px);
}

.btn-ghost{
  padding:12px 18px;
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:10px;
  text-decoration:none;
  color:var(--t2);
  transition:0.2s;
}

.btn-ghost:hover{
  color:var(--text);
  border-color:var(--border-h);
}

/* mini öneriler */
.quick-links{
  margin-top:28px;
  display:flex;
  gap:8px;
  justify-content:center;
  flex-wrap:wrap;
}

.quick-links a{
  font-size:12px;
  color:var(--t2);
  text-decoration:none;
  padding:6px 10px;
  border:1px solid var(--border);
  border-radius:6px;
  transition:0.2s;
}

.quick-links a:hover{
  color:var(--gold);
  border-color:var(--border-h);
}
</style>
</head>

<body>

<div class="bg">
  <div class="bg-grid"></div>
</div>

<script type="module">
  import "/js/core.js";
  window.loadNavbar();
</script>

<div class="page-404">

  <div class="box">
    
    <div class="code">404</div>

    <div class="title">404</div>

    <div class="desc">
      URL'yi yanlış yazmış olabilirsiniz veya aradığınız sayfa taşınmış olabilir.
    </div>


  </div>

</div>

</body>
</html>
