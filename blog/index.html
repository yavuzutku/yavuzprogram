<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — AlmancaPratik</title>
  <meta name="description" content="AlmancaPratik blog — Almanca öğrenme ipuçları, gramer rehberleri ve dil öğrenimi hakkında yazılar.">
  <link rel="icon" href="../favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/global.css">
<style>
:root {
  --bg:       #070709;
  --surface:  rgba(255,255,255,0.03);
  --surface2: rgba(255,255,255,0.055);
  --border:   rgba(255,255,255,0.07);
  --border-h: rgba(255,255,255,0.14);
  --text:     #f0eee8;
  --text-2:   rgba(240,238,232,0.55);
  --text-3:   rgba(240,238,232,0.28);
  --gold:     #c9a84c;
  --gold-l:   #e8c97a;
  --rose:     #f07068;
  --green:    #4fd69c;
  --font-d:   'Syne', sans-serif;
  --font-b:   'DM Sans', sans-serif;
  --font-m:   'DM Mono', monospace;
  --font-s:   'Lora', Georgia, serif;
  --tr:       0.2s cubic-bezier(0.4,0,0.2,1);
  --radius:   16px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-b); background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }

/* ── BG ── */
.bg-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
.bg-grid {
  position: absolute; inset: 0;
  background-image: linear-gradient(rgba(255,255,255,0.022) 1px, transparent 1px), linear-gradient(90deg,rgba(255,255,255,0.022) 1px,transparent 1px);
  background-size: 52px 52px;
  mask-image: radial-gradient(ellipse 80% 50% at 50% 0%, black 20%, transparent 100%);
}
.bg-glow { position: absolute; border-radius: 50%; filter: blur(120px); pointer-events: none; animation: drift 14s ease-in-out infinite alternate; }
.bg-glow-1 { width:600px;height:600px;top:-200px;left:-100px; background:radial-gradient(circle,rgba(201,168,76,0.08),transparent 70%); }
.bg-glow-2 { width:400px;height:400px;bottom:0;right:-100px; background:radial-gradient(circle,rgba(96,200,240,0.05),transparent 70%); animation-delay:-7s; }
@keyframes drift { from{transform:translate(0,0)} to{transform:translate(30px,20px)} }

/* ── VIEWS ── */
#viewList, #viewPost, #viewEditor { display: none; }
#viewList.active, #viewPost.active, #viewEditor.active { display: block; }

/* ══════════════════════════
   LIST VIEW
══════════════════════════ */
.blog-wrap {
  position: relative; z-index: 1;
  max-width: 920px; margin: 0 auto;
  padding: 40px 24px 100px;
}

.blog-header {
  display: flex; align-items: flex-end; justify-content: space-between;
  margin-bottom: 48px; gap: 16px; flex-wrap: wrap;
}


.blog-eyebrow {
  display: inline-flex; align-items: center; gap: 7px;
  font-size: 10px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--gold); opacity: 0.75; margin-bottom: 10px;
}
.blog-eyebrow-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--gold); box-shadow: 0 0 6px var(--gold); animation: pulse 2.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

.blog-title-main {
  font-family: var(--font-d);
  font-size: clamp(28px, 5vw, 48px);
  font-weight: 800; letter-spacing: -0.03em;
  color: var(--text); line-height: 1.05;
}

.btn-new-post {
  display: flex; align-items: center; gap: 7px;
  padding: 10px 20px;
  background: linear-gradient(135deg, var(--gold), var(--gold-l));
  color: #0a0a0f; font-family: var(--font-b); font-size: 13px; font-weight: 700;
  border: none; border-radius: 10px; cursor: pointer;
  box-shadow: 0 4px 20px rgba(201,168,76,0.35); transition: var(--tr);
  white-space: nowrap;
}
.btn-new-post:hover { transform: translateY(-1px); box-shadow: 0 8px 28px rgba(201,168,76,0.5); }
.btn-new-post:active { transform: scale(0.97); }

/* Posts grid */
.posts-grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 20px;
}
@media(max-width:640px){ .posts-grid { grid-template-columns: 1fr; } }

.post-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
  cursor: pointer; transition: var(--tr);
  display: flex; flex-direction: column;
  animation: fadeUp 0.4s cubic-bezier(0.4,0,0.2,1) both;
}
.post-card:hover { border-color: var(--border-h); background: var(--surface2); transform: translateY(-3px); box-shadow: 0 16px 40px rgba(0,0,0,0.4); }

.post-card-img {
  width: 100%; height: 200px; object-fit: cover;
  display: block; background: rgba(255,255,255,0.03);
}
.post-card-img-placeholder {
  width: 100%; height: 160px;
  background: linear-gradient(135deg, rgba(201,168,76,0.06), rgba(96,200,240,0.04));
  display: flex; align-items: center; justify-content: center;
  font-size: 32px; opacity: 0.3;
}

.post-card-body { padding: 20px 22px 22px; flex: 1; display: flex; flex-direction: column; gap: 8px; }

.post-card-meta {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--font-m); font-size: 10.5px; color: var(--text-3);
}
.post-card-tag {
  padding: 2px 8px; border-radius: 4px;
  background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.2);
  color: var(--gold); font-size: 10px; font-weight: 600;
}
.post-card-dot { width: 2px; height: 2px; border-radius: 50%; background: var(--text-3); }

.post-card-title {
  font-family: var(--font-d); font-size: 17px; font-weight: 800;
  letter-spacing: -0.02em; color: var(--text); line-height: 1.3;
}

.post-card-excerpt {
  font-size: 13px; line-height: 1.7; color: var(--text-2);
  flex: 1;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
  line-clamp: 3;
}

.post-card-footer {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border);
}
.post-card-read {
  font-size: 12px; font-weight: 600; color: var(--gold);
  display: flex; align-items: center; gap: 5px;
  transition: gap var(--tr);
}
.post-card:hover .post-card-read { gap: 8px; }

.post-card-admin { display: flex; gap: 6px; }
.btn-icon-sm {
  width: 28px; height: 28px; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid var(--border); background: transparent; cursor: pointer;
  color: var(--text-3); transition: var(--tr);
}
.btn-icon-sm:hover { border-color: var(--border-h); color: var(--text); }
.btn-icon-sm.danger:hover { border-color: rgba(240,112,104,0.4); color: var(--rose); }

/* Empty state */
.posts-empty {
  grid-column: 1/-1; text-align: center; padding: 80px 20px;
  color: var(--text-3);
}
.posts-empty-icon { font-size: 40px; margin-bottom: 14px; opacity: 0.4; }
.posts-empty-text { font-size: 14px; }

/* Loading */
.posts-loading {
  grid-column: 1/-1; display: flex; justify-content: center; padding: 60px;
}
.spinner {
  width: 32px; height: 32px; border-radius: 50%;
  border: 2px solid var(--border); border-top-color: var(--gold);
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

/* ══════════════════════════
   POST VIEW (okuma)
══════════════════════════ */
.post-wrap {
  position: relative; z-index: 1;
  max-width: 720px; margin: 0 auto;
  padding: 40px 24px 100px;
}

.post-back {
  display: inline-flex; align-items: center; gap: 7px;
  font-size: 13px; color: var(--text-3); cursor: pointer; margin-bottom: 40px;
  background: none; border: none; padding: 0; transition: color var(--tr);
}
.post-back:hover { color: var(--text); }

.post-hero-img {
  width: 100%; max-height: 420px; object-fit: cover;
  border-radius: var(--radius); margin-bottom: 36px;
  border: 1px solid var(--border);
}

.post-meta-row {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  margin-bottom: 16px;
  font-family: var(--font-m); font-size: 11px; color: var(--text-3);
}
.post-tag {
  padding: 3px 10px; border-radius: 5px;
  background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.2);
  color: var(--gold); font-size: 10.5px; font-weight: 600;
}

.post-heading {
  font-family: var(--font-d); font-size: clamp(26px, 4vw, 40px);
  font-weight: 800; letter-spacing: -0.03em; line-height: 1.1;
  color: var(--text); margin-bottom: 28px;
}

.post-body {
  font-family: var(--font-s); font-size: 17px; line-height: 1.9;
  color: rgba(240,238,232,0.82);
}
.post-body h2 { font-family: var(--font-d); font-size: 22px; font-weight: 800; color: var(--text); margin: 36px 0 14px; letter-spacing: -0.02em; }
.post-body h3 { font-family: var(--font-d); font-size: 18px; font-weight: 700; color: var(--text); margin: 28px 0 10px; }
.post-body p { margin-bottom: 20px; }
.post-body strong { color: var(--text); font-weight: 600; }
.post-body em { font-style: italic; color: rgba(240,238,232,0.7); }
.post-body a { color: var(--gold); text-decoration: underline; text-underline-offset: 3px; }
.post-body ul, .post-body ol { margin: 0 0 20px 24px; }
.post-body li { margin-bottom: 8px; line-height: 1.75; }
.post-body blockquote {
  border-left: 3px solid var(--gold); padding: 12px 20px; margin: 24px 0;
  background: rgba(201,168,76,0.05); border-radius: 0 10px 10px 0;
  color: rgba(240,238,232,0.65); font-style: italic;
}
.post-body code { font-family: var(--font-m); background: rgba(255,255,255,0.07); padding: 2px 7px; border-radius: 4px; font-size: 14px; color: #60c8f0; }
.post-body hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }

.post-nav-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 36px; gap: 12px; flex-wrap: wrap;
}
.post-admin-actions { display: flex; gap: 8px; }
.post-admin-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: 9px; cursor: pointer;
  font-family: var(--font-b); font-size: 13px; font-weight: 600;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--text-2); transition: var(--tr);
}
.post-admin-btn:hover { border-color: var(--border-h); color: var(--text); background: var(--surface2); }
.post-admin-btn--danger { color: rgba(240,112,104,0.7); border-color: rgba(240,112,104,0.2); background: rgba(240,112,104,0.05); }
.post-admin-btn--danger:hover { color: var(--rose); border-color: rgba(240,112,104,0.4); background: rgba(240,112,104,0.1); }
.post-draft-badge {
  padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 600;
  background: rgba(255,210,80,0.1); border: 1px solid rgba(255,210,80,0.2); color: #ffd250;
  font-family: var(--font-m);
}

/* ══════════════════════════
   EDITOR VIEW
══════════════════════════ */
.editor-wrap {
  position: relative; z-index: 1;
  max-width: 1100px; margin: 0 auto;
  padding: 24px 24px 80px;
  display: grid;
  grid-template-columns: 1fr 340px;
  gap: 24px;
  align-items: start;
}
@media(max-width:900px){ .editor-wrap { grid-template-columns: 1fr; } }

/* Editor main */
.editor-main {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; overflow: hidden;
}

.editor-toolbar {
  display: flex; align-items: center; gap: 3px; flex-wrap: wrap;
  padding: 10px 14px; border-bottom: 1px solid var(--border);
  background: rgba(255,255,255,0.02);
  row-gap: 6px;
}

.tb-btn {
  display: flex; align-items: center; justify-content: center;
  width: 32px; height: 32px; border-radius: 7px;
  background: transparent; border: none; color: var(--text-2);
  cursor: pointer; transition: var(--tr); font-size: 13px;
  font-family: var(--font-b); font-weight: 600;
}
.tb-btn:hover { background: var(--surface2); color: var(--text); }
.tb-btn.active { background: rgba(201,168,76,0.12); color: var(--gold); }
.tb-sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; flex-shrink: 0; }
.tb-select {
  height: 32px; padding: 0 8px;
  background: rgba(255,255,255,0.04); border: 1px solid var(--border);
  border-radius: 7px; color: var(--text-2);
  font-family: var(--font-b); font-size: 11px; cursor: pointer;
  outline: none; transition: var(--tr); max-width: 90px;
}
.tb-select:hover { border-color: var(--border-h); color: var(--text); }
.tb-select option { background: #12121a; color: var(--text); }
/* Highlight */
mark { background: rgba(255,210,80,0.28); color: var(--text); border-radius: 2px; padding: 0 2px; }
/* Editor içi tablo */
.editor-content table { width: 100%; border-collapse: collapse; margin: 16px 0; }
.editor-content th, .editor-content td { border: 1px solid var(--border); padding: 8px 12px; font-size: 14px; text-align: left; }
.editor-content th { background: rgba(255,255,255,0.04); color: var(--text); font-weight: 600; }
.editor-content td { color: var(--text-2); }
/* Post görünümünde tablo */
.post-body table { width: 100%; border-collapse: collapse; margin: 20px 0; }
.post-body th, .post-body td { border: 1px solid var(--border); padding: 10px 14px; font-size: 15px; text-align: left; }
.post-body th { background: rgba(255,255,255,0.04); color: var(--text); font-weight: 600; font-family: var(--font-d); }
.post-body td { color: rgba(240,238,232,0.75); }
/* Editor içi görsel */
.editor-content img { max-width: 100%; border-radius: 10px; margin: 12px 0; border: 1px solid var(--border); }

/* Title input */
.editor-title-input {
  width: 100%; padding: 24px 28px 0;
  font-family: var(--font-d); font-size: 28px; font-weight: 800;
  letter-spacing: -0.025em; color: var(--text);
  background: transparent; border: none; outline: none; resize: none;
  line-height: 1.2;
}
.editor-title-input::placeholder { color: rgba(240,238,232,0.15); }

/* Rich text editor area */
.editor-content {
  min-height: 480px; padding: 16px 28px 28px;
  font-family: var(--font-s); font-size: 16px; line-height: 1.85;
  color: rgba(240,238,232,0.82);
  outline: none;
  word-break: break-word;
}
.editor-content:empty::before {
  content: attr(data-placeholder);
  color: rgba(240,238,232,0.18); pointer-events: none;
  font-style: italic;
}
.editor-content h2 { font-family: var(--font-d); font-size: 22px; font-weight: 800; color: var(--text); margin: 28px 0 12px; letter-spacing: -0.02em; }
.editor-content h3 { font-family: var(--font-d); font-size: 18px; font-weight: 700; color: var(--text); margin: 22px 0 8px; }
.editor-content blockquote { border-left: 3px solid var(--gold); padding: 10px 18px; margin: 20px 0; background: rgba(201,168,76,0.05); border-radius: 0 8px 8px 0; font-style: italic; color: rgba(240,238,232,0.6); }
.editor-content a { color: var(--gold); }
.editor-content code { font-family: var(--font-m); background: rgba(255,255,255,0.07); padding: 1px 6px; border-radius: 4px; font-size: 14px; color: #60c8f0; }

/* Word count */
.editor-footer-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 28px; border-top: 1px solid var(--border);
  background: rgba(255,255,255,0.015);
  font-family: var(--font-m); font-size: 11px; color: var(--text-3);
}

/* Editor sidebar */
.editor-sidebar { display: flex; flex-direction: column; gap: 16px; }

.sidebar-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px;
}
.sidebar-card-title {
  font-size: 10.5px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-3); margin-bottom: 14px;
}

/* Cover image upload */
.cover-upload-area {
  width: 100%; aspect-ratio: 16/9; border-radius: 10px;
  border: 2px dashed var(--border); background: rgba(255,255,255,0.02);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 8px; cursor: pointer; transition: var(--tr); overflow: hidden;
  position: relative;
}
.cover-upload-area:hover { border-color: var(--border-h); background: rgba(255,255,255,0.04); }
.cover-upload-area img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }
.cover-upload-icon { font-size: 22px; opacity: 0.3; position: relative; z-index: 1; }
.cover-upload-text { font-size: 12px; color: var(--text-3); position: relative; z-index: 1; }
.cover-upload-input { display: none; }
.cover-remove-btn {
  position: absolute; top: 8px; right: 8px; z-index: 2;
  width: 26px; height: 26px; border-radius: 6px;
  background: rgba(7,7,9,0.8); border: 1px solid var(--border);
  color: var(--text-3); cursor: pointer; font-size: 12px;
  display: flex; align-items: center; justify-content: center; transition: var(--tr);
}
.cover-remove-btn:hover { color: var(--rose); border-color: rgba(240,112,104,0.4); }

/* Form fields */
.field-label {
  display: block; font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
  text-transform: uppercase; color: var(--text-3); margin-bottom: 6px;
}
.field-input {
  width: 100%; padding: 9px 12px; background: rgba(255,255,255,0.04);
  border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); font-family: var(--font-b); font-size: 13px;
  outline: none; transition: var(--tr);
}
.field-input::placeholder { color: var(--text-3); }
.field-input:focus { border-color: rgba(201,168,76,0.4); background: rgba(255,255,255,0.06); }

/* Status & publish */
.status-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px; border-radius: 9px; margin-bottom: 12px;
  font-size: 12px; font-weight: 600;
}
.status-draft    { background: rgba(255,255,255,0.04); border: 1px solid var(--border); color: var(--text-3); }
.status-published{ background: rgba(79,214,156,0.08); border: 1px solid rgba(79,214,156,0.2); color: var(--green); }
.status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.status-draft .status-dot    { background: var(--text-3); }
.status-published .status-dot{ background: var(--green); box-shadow: 0 0 6px var(--green); }

.btn-publish {
  width: 100%; padding: 12px; border: none; border-radius: 10px; cursor: pointer;
  font-family: var(--font-b); font-size: 14px; font-weight: 700; transition: var(--tr);
  background: linear-gradient(135deg, var(--gold), var(--gold-l));
  color: #0a0a0f; box-shadow: 0 4px 20px rgba(201,168,76,0.3);
}
.btn-publish:hover { transform: translateY(-1px); box-shadow: 0 8px 28px rgba(201,168,76,0.45); }
.btn-publish:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

.btn-draft {
  width: 100%; padding: 10px; border: 1px solid var(--border);
  border-radius: 10px; cursor: pointer; margin-top: 8px;
  font-family: var(--font-b); font-size: 13px; font-weight: 500;
  background: transparent; color: var(--text-2); transition: var(--tr);
}
.btn-draft:hover { background: var(--surface2); border-color: var(--border-h); color: var(--text); }

.btn-back-list {
  width: 100%; padding: 10px; border: 1px solid rgba(240,112,104,0.2);
  border-radius: 10px; cursor: pointer; margin-top: 4px;
  font-family: var(--font-b); font-size: 13px; font-weight: 500;
  background: transparent; color: rgba(240,112,104,0.6); transition: var(--tr);
}
.btn-back-list:hover { background: rgba(240,112,104,0.07); color: var(--rose); border-color: rgba(240,112,104,0.4); }

/* Toast */
.blog-toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  padding: 10px 22px; border-radius: 30px; z-index: 9999; pointer-events: none;
  font-family: var(--font-b); font-size: 13px; font-weight: 600;
  white-space: nowrap; box-shadow: 0 6px 24px rgba(0,0,0,0.4);
  animation: toastIn 0.25s cubic-bezier(0.34,1.56,0.64,1) both;
}
.blog-toast.ok  { background: var(--green); color: #fff; }
.blog-toast.err { background: var(--rose);  color: #fff; }
@keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }

/* Delete confirm */
.confirm-overlay {
  position: fixed; inset: 0; z-index: 8888; display: none;
  background: rgba(7,7,9,0.8); backdrop-filter: blur(6px);
  align-items: center; justify-content: center; padding: 20px;
}
.confirm-overlay.open { display: flex; }
.confirm-card {
  background: #0f0f14; border: 1px solid rgba(255,255,255,0.1);
  border-radius: 18px; padding: 32px 28px; max-width: 360px; width: 100%;

<script type="module">

import {

import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* ── Firebase ── */
const firebaseConfig = {
  apiKey:            "AIzaSyCGpRMUNNSx4Kla2YrmDOBHlLSt4rOM1wQ",
  authDomain:        "lernen-deutsch-bea69.firebaseapp.com",
  projectId:         "lernen-deutsch-bea69",
  storageBucket:     "lernen-deutsch-bea69.firebasestorage.app",
  messagingSenderId: "653560965391",
  appId:             "1:653560965391:web:545142e9be6d130a54b67a"
};
const app  = getApps().find(a=>a.name==="[DEFAULT]") || initializeApp(firebaseConfig);
const db   = getFirestore(app);
const auth = getAuth(app);

const ADMIN_EMAIL = "yavuzutku144@gmail.com";
const BLOGS_COL   = collection(db, "blogs");

/* ── State ── */
let currentUser   = null;
let isAdmin       = false;
let editingId     = null;
let coverFile     = null;
let coverDataUrl  = null;
let deleteTargetId= null;
let wordTimer     = null;

/* ── Auth ── */
onAuthStateChanged(auth, user => {
  currentUser = user;
  isAdmin     = !!(user && user.email === ADMIN_EMAIL);
  document.getElementById("btnNewPost").style.display = isAdmin ? "flex" : "none";
});

/* ── View switching + URL routing ── */
let _currentPostId = null;

function showView(id, urlParams = {}) {
  ["viewList","viewPost","viewEditor"].forEach(v => {
    document.getElementById(v).classList.toggle("active", v === id);
  });
  window.scrollTo(0, 0);

  // URL güncelle
  const url = new URL(window.location.href);
  url.search = "";
  if (id === "viewPost"   && urlParams.slug) url.searchParams.set("p",    urlParams.slug);
  if (id === "viewPost"   && !urlParams.slug && urlParams.id) url.searchParams.set("id", urlParams.id);
  if (id === "viewEditor" && urlParams.edit)  url.searchParams.set("edit", urlParams.edit);
  if (id === "viewEditor" && !urlParams.edit) url.searchParams.set("edit", "new");
  history.pushState({view: id, ...urlParams}, "", url.toString());
}

// Geri/ileri tuşu
window.addEventListener("popstate", e => {
  const params = new URLSearchParams(window.location.search);
  const slug = params.get("p");
  const id   = params.get("id");
  const edit = params.get("edit");
  if (edit) {
    if (edit === "new") openEditor(null);
    else editPost(edit);
  } else if (slug) {
    loadPostBySlug(slug);
  } else if (id) {
    loadPostById(id);
  } else {
    ["viewList","viewPost","viewEditor"].forEach(v => {
      document.getElementById(v).classList.toggle("active", v === "viewList");
    });
    loadPosts();
  }
});

/* ══════════════════════════
   LIST
══════════════════════════ */
async function loadPosts() {
  const grid = document.getElementById("postsGrid");
  grid.innerHTML = `<div class="posts-loading"><div class="spinner"></div></div>`;

  try {
    const q    = query(BLOGS_COL, orderBy("createdAt","desc"));
    const snap = await getDocs(q);
    const all  = snap.docs.map(d => ({id:d.id,...d.data()}));
    const posts = isAdmin ? all : all.filter(p => p.published);

    if (!posts.length) {
      grid.innerHTML = `<div class="posts-empty"><div class="posts-empty-icon">✍️</div><div class="posts-empty-text">${isAdmin?"Henüz yazı yok. İlk yazını ekle!":"Henüz yazı yayınlanmamış."}</div></div>`;
      return;
    }

    grid.innerHTML = "";
    posts.forEach((post, i) => {
      const card = document.createElement("div");
      card.className = "post-card";
      card.style.animationDelay = (i * 60) + "ms";

      const imgHtml = post.coverUrl
        ? `<img class="post-card-img" src="${esc(post.coverUrl)}" alt="${esc(post.title)}" loading="lazy">`
        : `<div class="post-card-img-placeholder">✍️</div>`;

      const date = post.createdAt?.toDate
        ? post.createdAt.toDate().toLocaleDateString("tr-TR",{day:"2-digit",month:"long",year:"numeric"})
        : "—";

      const words = wordCountText(post.content || "");
      const readMin = Math.max(1, Math.round(words / 200));

      const adminBtns = isAdmin ? `
        <div class="post-card-admin" onclick="event.stopPropagation()">
          <button class="btn-icon-sm" title="Düzenle" onclick="editPost('${post.id}')">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="btn-icon-sm danger" title="Sil" onclick="confirmDeletePost('${post.id}')">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          </button>
        </div>` : "";

      const statusBadge = isAdmin && !post.published
        ? `<span style="font-size:10px;padding:2px 7px;border-radius:4px;background:rgba(255,210,80,0.1);border:1px solid rgba(255,210,80,0.2);color:#ffd250;font-family:var(--font-m);">Taslak</span>` : "";

      card.innerHTML = `
        ${imgHtml}
        <div class="post-card-body">
          <div class="post-card-meta">
            ${post.tag ? `<span class="post-card-tag">${esc(post.tag)}</span><span class="post-card-dot"></span>` : ""}
            <span>${date}</span>
            <span class="post-card-dot"></span>
            <span>${readMin} dk okuma</span>
            ${statusBadge}
          </div>
          <div class="post-card-title">${esc(post.title||"Başlıksız")}</div>
          ${post.excerpt ? `<div class="post-card-excerpt">${esc(post.excerpt)}</div>` : ""}
          <div class="post-card-footer">
            <span class="post-card-read">Okumaya başla <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></span>
            ${adminBtns}
          </div>
        </div>
      `;

      card.dataset.postId = post.id;
      card.addEventListener("click", e => {
        // Orta tık veya Ctrl+tık → yeni sekme
        if (e.ctrlKey || e.metaKey || e.button === 1) return;
        e.preventDefault();
        openPost(post);
      });
      // Sağ tık → tarayıcı menüsü için href benzeri davranış
      card.style.cursor = "pointer";
      grid.appendChild(card);
    });

  } catch(e) {
    grid.innerHTML = `<div class="posts-empty"><div class="posts-empty-text">Yazılar yüklenirken hata oluştu.</div></div>`;
    console.error(e);
  }
}

/* ══════════════════════════
   POST VIEW
══════════════════════════ */
async function loadPostById(id) {
  try {
    const snap = await getDoc(doc(db, "blogs", id));
    if (!snap.exists()) { showView("viewList"); loadPosts(); return; }
    openPost({ id: snap.id, ...snap.data() }, false);
  } catch(e) {
    console.error(e); showView("viewList"); loadPosts();
  }
}

async function loadPostBySlug(slug) {
  try {
    const q    = query(BLOGS_COL, where("slug", "==", slug));
    const snap = await getDocs(q);
    if (snap.empty) { showView("viewList"); loadPosts(); return; }
    const d = snap.docs[0];
    openPost({ id: d.id, ...d.data() }, false);
  } catch(e) {
    console.error(e); showView("viewList"); loadPosts();
  }
}

function openPost(post, pushUrl = true) {
  _currentPostId = post.id;

  const heroImg   = document.getElementById("postHeroImg");
  const tagEl     = document.getElementById("postTag");
  const dateEl    = document.getElementById("postDate");
  const rtEl      = document.getElementById("postReadTime");
  const headEl    = document.getElementById("postHeading");
  const bodyEl    = document.getElementById("postBody");
  const adminEl   = document.getElementById("postAdminActions");
  const draftEl   = document.getElementById("postDraftBadge");

  // Sayfa başlığını güncelle
  document.title = (post.title || "Yazı") + " — AlmancaPratik Blog";

  if (post.coverUrl) {
    heroImg.src = post.coverUrl; heroImg.alt = post.title || "";
    heroImg.style.display = "block";
  } else {
    heroImg.style.display = "none";
  }

  if (post.tag) { tagEl.textContent = post.tag; tagEl.style.display = "inline-flex"; }
  else tagEl.style.display = "none";

  draftEl.style.display = (isAdmin && !post.published) ? "inline-flex" : "none";

  const date = post.createdAt?.toDate
    ? post.createdAt.toDate().toLocaleDateString("tr-TR",{day:"2-digit",month:"long",year:"numeric"})
    : "—";
  dateEl.textContent = date;

  const words   = wordCountText(post.content || "");
  const readMin = Math.max(1, Math.round(words / 200));
  rtEl.textContent = readMin + " dk okuma";

  headEl.textContent = post.title || "Başlıksız";
  bodyEl.innerHTML   = post.content || "";

  // Admin butonları
  adminEl.style.display = isAdmin ? "flex" : "none";

  if (pushUrl) {
    showView("viewPost", post.slug ? { slug: post.slug } : { id: post.id });
  } else {
    ["viewList","viewPost","viewEditor"].forEach(v => {
      document.getElementById(v).classList.toggle("active", v === "viewPost");
    });
    window.scrollTo(0, 0);
  }
}

  document.title = "Blog — AlmancaPratik";

  loadPosts();
});

document.getElementById("btnEditCurrentPost").addEventListener("click", () => {

   EDITOR
══════════════════════════ */
function openEditor(post = null) {
  editingId    = post?.id || null;
  coverFile    = null;
  coverDataUrl = post?.coverUrl || null;

  const titleEl   = document.getElementById("editorTitle");
  const contentEl = document.getElementById("editorContent");
  const tagEl     = document.getElementById("fieldTag");
  const excerptEl = document.getElementById("fieldExcerpt");
  const preview   = document.getElementById("coverPreview");
  const removeBtn = document.getElementById("coverRemoveBtn");
  const statusRow = document.getElementById("postStatusRow");
  const statusTxt = document.getElementById("postStatusText");
  const publishBtn= document.getElementById("btnPublish");

  titleEl.value      = post?.title   || "";
  contentEl.innerHTML= post?.content || "";
  tagEl.value        = post?.tag     || "";
  excerptEl.value    = post?.excerpt || "";

  if (post?.coverUrl) {
    preview.src = post.coverUrl; preview.style.display = "block";
    removeBtn.style.display = "flex";
  } else {
    preview.src = ""; preview.style.display = "none";
    removeBtn.style.display = "none";
  }

  const pub = post?.published || false;
  statusRow.className = `status-row ${pub ? "status-published" : "status-draft"}`;
  statusTxt.textContent = pub ? "Yayında" : "Taslak";
  publishBtn.textContent = pub ? "Yayından Kaldır" : "Yayınla →";

  updateWordCount();
  showView("viewEditor", editingId ? { edit: editingId } : {});
}

/* ── Toolbar ── */
document.querySelectorAll(".tb-btn").forEach(btn => {
  btn.addEventListener("mousedown", e => {
    e.preventDefault();
    const cmd = btn.dataset.cmd;
    if (!cmd) return;
    const ed = document.getElementById("editorContent");

    if (cmd === "h2") {
      document.execCommand("formatBlock", false, "h2");
    } else if (cmd === "h3") {
      document.execCommand("formatBlock", false, "h3");
    } else if (cmd === "blockquote") {
      document.execCommand("formatBlock", false, "blockquote");
    } else if (cmd === "createLink") {
      const url = prompt("Link URL:");
      if (url) document.execCommand("createLink", false, url);
    } else if (cmd === "highlight") {
      /* Vurgulama: seçili metni <mark> içine al */
      const sel = window.getSelection();
      if (sel && sel.rangeCount && !sel.isCollapsed) {
        const range = sel.getRangeAt(0);
        const mark  = document.createElement("mark");
        range.surroundContents(mark);
        sel.removeAllRanges();
      }
    } else if (cmd === "insertHR") {
      document.execCommand("insertHTML", false, "<hr>");
    } else if (cmd === "insertTable") {
      const rows = parseInt(prompt("Satır sayısı:", "3")) || 3;
      const cols = parseInt(prompt("Sütun sayısı:", "3")) || 3;
      let html = "<table><thead><tr>";
      for (let c2 = 0; c2 < cols; c2++) html += `<th>Başlık ${c2+1}</th>`;
      html += "</tr></thead><tbody>";
      for (let r = 0; r < rows - 1; r++) {
        html += "<tr>";
        for (let c2 = 0; c2 < cols; c2++) html += "<td>Hücre</td>";
        html += "</tr>";
      }
      html += "</tbody></table><p></p>";
      document.execCommand("insertHTML", false, html);
    } else if (cmd === "insertImage") {
      const url = prompt("Görsel URL'si:");
      if (url) document.execCommand("insertHTML", false, `<img src="${url}" alt="görsel" style="max-width:100%;border-radius:10px;margin:12px 0;">`);
    } else {
      document.execCommand(cmd, false, null);
    }
    ed.focus();
  });
});

/* Yazı boyutu select */
document.getElementById("tbFontSize").addEventListener("change", function() {
  if (!this.value) return;
  document.execCommand("fontSize", false, this.value);
  document.getElementById("editorContent").focus();
  this.value = "";
});

/* Kısayol tuşları */
document.getElementById("editorContent").addEventListener("keydown", e => {
  if (!e.ctrlKey && !e.metaKey) return;
  if (e.key === "z") { e.preventDefault(); document.execCommand("undo"); }
  if (e.key === "y") { e.preventDefault(); document.execCommand("redo"); }
  if (e.key === "k") { e.preventDefault(); const url = prompt("Link URL:"); if (url) document.execCommand("createLink", false, url); }
  if (e.shiftKey && e.key === "X") { e.preventDefault(); document.execCommand("strikeThrough"); }
  if (e.shiftKey && e.key === "H") { e.preventDefault(); document.getElementById("editorContent").dispatchEvent(new MouseEvent("mousedown")); document.querySelector('[data-cmd="highlight"]').dispatchEvent(new MouseEvent("mousedown")); }
  if (e.shiftKey && e.key === "L") { e.preventDefault(); document.execCommand("justifyLeft"); }
  if (e.shiftKey && e.key === "E") { e.preventDefault(); document.execCommand("justifyCenter"); }
  if (e.shiftKey && e.key === "R") { e.preventDefault(); document.execCommand("justifyRight"); }
  if (e.key === "2") { e.preventDefault(); document.execCommand("formatBlock", false, "h2"); }
  if (e.key === "3") { e.preventDefault(); document.execCommand("formatBlock", false, "h3"); }
});

/* ── Word count ── */
function updateWordCount() {

}

/* ── Cover upload ── */
const coverArea  = document.getElementById("coverUploadArea");
const coverInput = document.getElementById("coverInput");

coverArea.addEventListener("click", e => {
  if (e.target === document.getElementById("coverRemoveBtn")) return;
  coverInput.click();
});

coverInput.addEventListener("change", e => {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 8 * 1024 * 1024) { toast("Görsel 8MB'dan küçük olmalı", "err"); return; }
  coverFile = file;
  /* Görseli canvas'ta sıkıştır — max 1200px, JPEG %80 */
  const img = new Image();
  const objectUrl = URL.createObjectURL(file);
  img.onload = () => {
    URL.revokeObjectURL(objectUrl);
    const MAX = 1200;
    let w = img.width, h = img.height;
    if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
    const canvas = document.createElement("canvas");
    canvas.width = w; canvas.height = h;
    canvas.getContext("2d").drawImage(img, 0, 0, w, h);
    coverDataUrl = canvas.toDataURL("image/jpeg", 0.80);
    const preview = document.getElementById("coverPreview");
    const removeBtn = document.getElementById("coverRemoveBtn");
    preview.src = coverDataUrl; preview.style.display = "block";
    removeBtn.style.display = "flex";
  };
  img.src = objectUrl;
});

/* Drag & drop */
coverArea.addEventListener("dragover", e => { e.preventDefault(); coverArea.style.borderColor = "var(--gold)"; });
coverArea.addEventListener("dragleave", () => { coverArea.style.borderColor = ""; });
coverArea.addEventListener("drop", e => {
  e.preventDefault(); coverArea.style.borderColor = "";
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith("image/")) {
    coverInput.files = e.dataTransfer.files;
    coverInput.dispatchEvent(new Event("change"));
  }
});

document.getElementById("coverRemoveBtn").addEventListener("click", e => {
  e.stopPropagation();
  coverFile = null; coverDataUrl = null;
  const preview = document.getElementById("coverPreview");
  const removeBtn = document.getElementById("coverRemoveBtn");
  preview.src = ""; preview.style.display = "none";
  removeBtn.style.display = "none";
  coverInput.value = "";
});

/* ── Save / Publish ── */
async function savePost(publish) {
  if (!isAdmin) return;
  const title   = document.getElementById("editorTitle").value.trim();
  const content = document.getElementById("editorContent").innerHTML;
  const tag     = document.getElementById("fieldTag").value.trim();
  const excerpt = document.getElementById("fieldExcerpt").value.trim();

  if (!title) { toast("Başlık boş olamaz", "err"); return; }

  const publishBtn = document.getElementById("btnPublish");
  const draftBtn   = document.getElementById("btnSaveDraft");
  publishBtn.disabled = true; draftBtn.disabled = true;

  try {
    /* Görsel base64 olarak Firestore'a kaydedilir — Storage/CORS gerektirmez */
    let coverUrl = coverDataUrl || null;

    const isPublished = (() => {
      if (publish === null) {
        /* Mevcut durumu koru */
        const txt = document.getElementById("postStatusText").textContent;
        return txt === "Yayında";
      }
      return publish;
    })();

    // Slug: yeni yazıda her zaman üret, düzenlemede sadece başlık değiştiyse güncelle
    let slug;
    if (editingId) {
      // Mevcut slug'ı koru, sadece başlık değişmişse güncelle
      const existing = await getDoc(doc(db, "blogs", editingId));
      const existingSlug = existing.data()?.slug;
      const existingTitle = existing.data()?.title;
      if (!existingSlug || existingTitle !== title) {
        slug = await ensureUniqueSlug(toSlug(title), editingId);
      } else {
        slug = existingSlug;
      }
    } else {
      slug = await ensureUniqueSlug(toSlug(title));
    }

    const data = {
      title, content, tag, excerpt, slug,
      published: isPublished,
      updatedAt: serverTimestamp(),
      ...(coverUrl !== null ? { coverUrl } : {}),
    };

    if (editingId) {
      await updateDoc(doc(db, "blogs", editingId), data);
    } else {
      data.createdAt = serverTimestamp();
      const ref2 = await addDoc(BLOGS_COL, data);
      editingId = ref2.id;
    }

    /* Status güncelle */
    const statusRow = document.getElementById("postStatusRow");
    const statusTxt = document.getElementById("postStatusText");
    statusRow.className = `status-row ${isPublished ? "status-published" : "status-draft"}`;
    statusTxt.textContent = isPublished ? "Yayında" : "Taslak";
    publishBtn.textContent = isPublished ? "Yayından Kaldır" : "Yayınla →";

    toast(isPublished ? "Yayınlandı ✓" : "Taslak kaydedildi ✓", "ok");
    document.getElementById("autoSaveStatus").textContent = "Kaydedildi";

    await loadPosts();

  } catch(e) {
    toast("Kayıt hatası: " + e.message, "err");
    console.error(e);
  } finally {
    publishBtn.disabled = false; draftBtn.disabled = false;
  }
}

/* ══════════════════════════
   UTILS
══════════════════════════ */
function toast(msg, type="ok") {
  document.querySelectorAll(".blog-toast").forEach(e=>e.remove());
  const el = document.createElement("div");
  el.className = `blog-toast ${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => { el.style.opacity="0"; el.style.transition="opacity 0.3s"; setTimeout(()=>el.remove(),300); }, 2500);
}

function esc(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function wordCountText(t) {
  return (t||"").trim().replace(/<[^>]+>/g,"").split(/\s+/).filter(Boolean).length;
}

/* Türkçe dahil tüm dilleri destekleyen slug üretici */
function toSlug(title) {
  const trMap = {
    'ğ':'g','Ğ':'g','ü':'u','Ü':'u','ş':'s','Ş':'s',
    'ı':'i','İ':'i','ö':'o','Ö':'o','ç':'c','Ç':'c',
    'â':'a','Â':'a','î':'i','Î':'i','û':'u','Û':'u'
  };
  return title
    .split('').map(ch => trMap[ch] || ch).join('')  // Türkçe harfleri dönüştür
    .toLowerCase()
    .replace(/[^a-z0-9\s-]/g, '')   // harf/rakam/boşluk/tire dışını kaldır
    .trim()
    .replace(/\s+/g, '-')            // boşlukları tireye çevir
    .replace(/-+/g, '-')             // tekrar eden tireleri temizle
    .slice(0, 80);                   // max 80 karakter
}

/* Slug'ın Firestore'da benzersiz olup olmadığını kontrol et */
async function ensureUniqueSlug(baseSlug, excludeId = null) {
  const q    = query(BLOGS_COL, where("slug", "==", baseSlug));
  const snap = await getDocs(q);
  const existing = snap.docs.filter(d => d.id !== excludeId);
  if (existing.length === 0) return baseSlug;
  // Çakışma varsa sonuna sayı ekle
  let n = 2;
  while (true) {
    const candidate = baseSlug + "-" + n;
    const q2    = query(BLOGS_COL, where("slug", "==", candidate));
    const snap2 = await getDocs(q2);
    const ex2   = snap2.docs.filter(d => d.id !== excludeId);
    if (ex2.length === 0) return candidate;
    n++;
  }
}

/* Globals for inline onclick */
window.editPost          = editPost;
window.confirmDeletePost = confirmDeletePost;

/* ── Init — URL'e göre başla ── */
(async function init() {
  const params = new URLSearchParams(window.location.search);
  const slug = params.get("p");
  const id   = params.get("id");
  const edit = params.get("edit");

  await loadPosts();

  if (edit && edit !== "new") {
    await editPost(edit);
  } else if (edit === "new") {
    openEditor(null);
  } else if (slug) {
    await loadPostBySlug(slug);
  } else if (id) {
    await loadPostById(id);
  } else {
    showView("viewList");
  }
})();
</script>
