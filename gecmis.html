<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Metin Geçmişi</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/gecmis.css">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

<div class="page-wrap">
  <div class="top-bar">
    <button class="back-btn" onclick="window.location.href='anasayfa.html'">← Geri</button>
    <h1 class="page-title">Metin Geçmişi</h1>
    <button class="clear-btn" id="clearAllBtn">Tümünü Sil</button>
  </div>

  <div class="search-wrap">
    <input type="text" id="searchInput" class="search-input" placeholder="Metinlerde ara...">
  </div>

  <div id="historyList" class="history-list">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">📭</div>
      <div class="empty-text">Henüz kaydedilmiş metin yok.</div>
    </div>
  </div>
</div>

<div id="previewModal" class="modal-overlay" style="display:none;">
  <div class="modal-card">
    <div class="modal-header">
      <span id="modalDate" class="modal-date"></span>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div id="modalText" class="modal-text"></div>
    <div class="modal-actions">
      <button class="btn-primary" id="modalRead">Okumaya Başla</button>
      <button class="btn-danger" id="modalDelete">Sil</button>
    </div>
  </div>
</div>

<!-- ✅ 1. core.js normal script -->
<script type="module">
  import "./js/core.js";  
  window.requireAuth();
  window.loadNavbar();
</script>

<!-- ✅ 2. gecmis.js module -->
<script type="module" src="js/gecmis.js"></script>

</body>
</html>
