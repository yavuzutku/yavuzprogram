<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Okuma Modu — AlmancaPratik</title>
  <link rel="icon" href="../favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/okuma.css">
</head>
<body>

<!-- Arka plan gradyanı -->
<div class="ok-bg" aria-hidden="true"></div>

<!--
  NAVBAR: core.js → window.loadNavbar() body'nin başına prepend eder.
  global.css: .navbar { position:sticky; top:0; height:62px }
  .ok-toolbar: position:sticky; top:var(--navbar-h) — metin.css ile aynı mantık.
-->

<!-- Alt araç çubuğu -->
<header class="ok-toolbar" id="okToolbar">

  <div class="ok-tb-left">
    <button class="ok-btn ok-btn-back" id="backBtn" title="Geri dön">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
      <span>Geri</span>
    </button>
    <button class="ok-btn ok-btn-word" id="addWordBtn" title="Seçili kelimeyi kaydet">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/>
      </svg>
      <span>Kelime Ekle</span>
    </button>
  </div>

  <div class="ok-tb-center">
    <span class="ok-tb-title">Okuma Modu</span>
    <span class="ok-tb-meta" id="readingMeta"></span>
  </div>

  <div class="ok-tb-right">
    <button class="ok-btn ok-btn-icon" id="fontDecBtn"    title="Küçült">A<sup>−</sup></button>
    <button class="ok-btn ok-btn-icon" id="fontIncBtn"    title="Büyüt">A<sup>+</sup></button>
    <button class="ok-btn ok-btn-icon" id="fontToggleBtn" title="Yazı tipi">Tf</button>
    <button class="ok-btn ok-btn-icon" id="themeBtn"      title="Tema">&#9728;</button>
    <button class="ok-btn ok-btn-icon" id="focusBtn"      title="Odak modu">&#8865;</button>
  </div>

</header>

<!-- İlerleme çubuğu -->
<div class="ok-progress" id="okProgress">
  <div class="ok-progress-fill" id="okProgressFill"></div>
</div>

<!-- Ana okuma alanı -->
<main class="ok-main">
  <article class="ok-card">
    <div id="readerBody" class="ok-body"></div>
  </article>
</main>

<!-- Floating "Anlam" butonu — position:fixed, JS konumlandırır -->
<!-- inline display:none: CSS load olmasa bile gizli kalır -->
<button id="floatingMeaningBtn" class="ok-meaning-btn" style="display:none" aria-label="Kelime anlamı">
  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
    <circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/>
  </svg>
  Anlam
</button>

<!-- Anlam popup — position:fixed -->
<div id="meaningPopup" class="ok-popup" style="display:none"></div>

<!-- Kelime kaydetme modalı -->
<!-- inline display:none: CSS olmasa da modal görünmez -->
<div class="ok-modal-overlay" id="wordModalOverlay" style="display:none" role="dialog" aria-modal="true">
  <div class="ok-modal">
    <div class="ok-modal-head">
      <span class="ok-modal-label">Kelimeyi Kaydet</span>
      <button class="ok-modal-x" id="wordModalClose" aria-label="Kapat">&#x2715;</button>
    </div>

    <div class="ok-modal-word" id="modalWordDisplay">—</div>

    <div class="ok-base-row" id="modalBaseFormWrap" style="display:none">
      <span>Temel form: <strong id="modalBaseFormText" class="ok-mono"></strong></span>
      <button class="ok-base-apply" id="applyBaseFormBtn">kullan &#x2192;</button>
    </div>

    <input
      type="text"
      id="modalMeaningInput"
      class="ok-modal-input"
      placeholder="Türkçe anlamını gir…"
      autocomplete="off"
    />

    <div class="ok-modal-tags">
      <div class="ok-tag-label">Etiket <span class="ok-tag-opt">(opsiyonel)</span></div>
      <div class="ok-tag-chips" id="modalTagChips"></div>
    </div>

    <div class="ok-modal-actions">
      <button class="ok-modal-cancel" id="wordModalCancelBtn">İptal</button>
      <button class="ok-modal-save"   id="wordModalSaveBtn">Kaydet</button>
    </div>
  </div>
</div>

<!-- Scripts: metin.html ile birebir aynı pattern -->
<script type="module">
  import "../js/core.js";
  window.loadNavbar();
</script>
<script type="module" src="../js/okuma.js"></script>

</body>
</html>
