<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="favicon.ico" type="image/x-icon">
<title>Giriş Yap</title>
<meta name="description" content="Almanca öğrenmek için kelime quizi, artikel bulucu, cümle örnekleri ve metin analizi. Ücretsiz Almanca pratik platformu.">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/index.css">

</head>
<body>

<div class="bg-layer"></div>
<div class="bg-grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="card">
  <div id="login-view">
    <div class="logo-wrap">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#0a0a0f" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <div class="logo-name">YavuzProgram</div>
      <div class="logo-tagline">Hesabına güvenle giriş yap</div>
    </div>

    <div class="divider"><span>Devam et</span></div>

    <div id="google-btn-container"></div>

    <div class="footer">
      Giriş yaparak <a href="#">Kullanım Koşulları</a>'nı ve<br>
      <a href="#">Gizlilik Politikası</a>'nı kabul etmiş olursunuz.
    </div>
  </div>

  <div class="user-panel" id="user-view">
    <img id="user-avatar" class="user-avatar"/>
    <div>
      <div class="user-name" id="user-name"></div>
      <div class="user-email" id="user-email"></div>
    </div>
    <div class="badge">Giriş yapıldı</div>
    <button class="signout-btn" id="logoutBtn">Çıkış Yap</button>
  </div>

</div>
<!-- ✅ index.js artık Firebase Auth kullanıyor, module olmalı -->
<script type="module" src="js/index.js"></script>
</body>
</html>
