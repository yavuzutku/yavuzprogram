<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — AlmancaPratik</title>
  <meta name="description" content="AlmancaPratik blog — Almanca öğrenme ipuçları, gramer rehberleri ve dil öğrenimi hakkında yazılar.">
  <link rel="icon" href="../favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&family=Lora:ital,wght@0,400;0,600;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Merriweather:ital,wght@0,300;0,400;1,300&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Nunito:wght@300;400;600&family=Raleway:wght@300;400;600&family=Josefin+Sans:wght@300;400;600&family=Courier+Prime:ital,wght@0,400;1,400&family=Bebas+Neue&family=Dancing+Script:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/global.css">
<style>
</style>
</head>

<body>

<div class="bg-canvas" aria-hidden="true">
  <div class="bg-grid"></div>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>
</div>

<!-- ══════════════ LIST VIEW ══════════════ -->
<div id="viewList">
  <div class="blog-wrap">
    <div class="blog-header">
      <div class="blog-header-left">
        <div class="blog-eyebrow"><span class="blog-eyebrow-dot"></span>AlmancaPratik</div>
        <h1 class="blog-title-main">Blog</h1>
      </div>
      <button class="btn-new-post" id="btnNewPost" style="display:none">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Yeni Yazı
      </button>
    </div>
    <div class="posts-grid" id="postsGrid">
      <div class="posts-loading"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<!-- ══════════════ POST VIEW ══════════════ -->
<div id="viewPost">
  <div class="post-wrap">
    <div class="post-nav-row">
      <button class="post-back" id="btnBackFromPost">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
        Tüm yazılar
      </button>
      <div class="post-admin-actions" id="postAdminActions" style="display:none">
        <button class="post-admin-btn" id="btnEditCurrentPost">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          Düzenle
        </button>
        <button class="post-admin-btn post-admin-btn--danger" id="btnDeleteCurrentPost">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          Sil
        </button>
      </div>
    </div>
    <img id="postHeroImg" class="post-hero-img" src="" alt="" style="display:none">
    <div class="post-meta-row">
      <span class="post-tag" id="postTag" style="display:none"></span>
      <span id="postDate"></span>
      <span class="post-card-dot"></span>
      <span id="postReadTime"></span>
      <span class="post-draft-badge" id="postDraftBadge" style="display:none">Taslak</span>
    </div>
    <h1 class="post-heading" id="postHeading"></h1>
    <div class="post-body" id="postBody"></div>
  </div>
</div>

<!-- ══════════════ EDITOR VIEW ══════════════ -->
<div id="viewEditor">
  <div class="editor-wrap">

    <!-- Sol: editör -->
    <div class="editor-main">
      <div class="editor-toolbar">
        <!-- Yazı tipi -->
        <select class="tb-select tb-select--wide" id="tbFontFamily" title="Yazı tipi">
          <option value="">Yazı tipi</option>
          <option value="DM Sans, sans-serif">DM Sans</option>
          <option value="Lora, Georgia, serif">Lora</option>
          <option value="Playfair Display, Georgia, serif">Playfair Display</option>
          <option value="Merriweather, Georgia, serif">Merriweather</option>
          <option value="Crimson Text, Georgia, serif">Crimson Text</option>
          <option value="Nunito, sans-serif">Nunito</option>
          <option value="Raleway, sans-serif">Raleway</option>
          <option value="Josefin Sans, sans-serif">Josefin Sans</option>
          <option value="Courier Prime, monospace">Courier Prime</option>
          <option value="Bebas Neue, sans-serif">Bebas Neue</option>
          <option value="Dancing Script, cursive">Dancing Script</option>
        </select>
        <div class="tb-sep"></div>
        <!-- Geri al / Yinele -->
        <button class="tb-btn" data-cmd="undo"  title="Geri al (Ctrl+Z)"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg></button>
        <button class="tb-btn" data-cmd="redo"  title="Yinele (Ctrl+Y)"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3L21 13"/></svg></button>
        <div class="tb-sep"></div>
        <!-- Yazı boyutu -->
        <select class="tb-select" id="tbFontSize" title="Yazı boyutu (Ctrl+Shift+S)">
          <option value="">Boyut</option>
          <option value="1">Çok Küçük</option>
          <option value="2">Küçük</option>
          <option value="3">Normal</option>
          <option value="4">Büyük</option>
          <option value="5">Çok Büyük</option>
          <option value="6">Dev</option>
        </select>
        <div class="tb-sep"></div>
        <!-- Format -->
        <button class="tb-btn" data-cmd="bold"           title="Kalın (Ctrl+B)"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/><path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/></svg></button>
        <button class="tb-btn" data-cmd="italic"         title="İtalik (Ctrl+I)"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="4" x2="10" y2="4"/><line x1="14" y1="20" x2="5" y2="20"/><line x1="15" y1="4" x2="9" y2="20"/></svg></button>
        <button class="tb-btn" data-cmd="underline"      title="Altı çizili (Ctrl+U)"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3v7a6 6 0 0 0 6 6 6 6 0 0 0 6-6V3"/><line x1="4" y1="21" x2="20" y2="21"/></svg></button>
        <button class="tb-btn" data-cmd="strikeThrough"  title="Üstü çizili (Ctrl+Shift+X)"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4H9a3 3 0 0 0-2.83 4"/><path d="M14 12a4 4 0 0 1 0 8H6"/><line x1="4" y1="12" x2="20" y2="12"/></svg></button>
        <button class="tb-btn" data-cmd="highlight"      title="Vurgula — tekrar basınca kaldırır (Ctrl+Shift+H)" style="font-size:14px;font-weight:700;color:#ffd250;">H</button>
        <div class="tb-sep"></div>
        <!-- Başlıklar -->
        <button class="tb-btn" data-cmd="h2" title="Büyük başlık — tekrar basınca normal metne döner (Ctrl+2)">H2</button>
        <button class="tb-btn" data-cmd="h3" title="Küçük başlık — tekrar basınca normal metne döner (Ctrl+3)">H3</button>
        <div class="tb-sep"></div>
        <!-- Hizalama -->
        <button class="tb-btn" data-cmd="justifyLeft"   title="Sola hizala (Ctrl+Shift+L)"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="17" y1="10" x2="3" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="17" y1="18" x2="3" y2="18"/></svg></button>
        <button class="tb-btn" data-cmd="justifyCenter" title="Ortala (Ctrl+Shift+E)"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="10" x2="6" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="18" y1="18" x2="6" y2="18"/></svg></button>
        <button class="tb-btn" data-cmd="justifyRight"  title="Sağa hizala (Ctrl+Shift+R)"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="21" y1="10" x2="7" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="21" y1="18" x2="7" y2="18"/></svg></button>
        <div class="tb-sep"></div>
        <!-- Listeler -->
        <button class="tb-btn" data-cmd="insertUnorderedList" title="Madde listesi"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><circle cx="4" cy="6" r="1" fill="currentColor"/><circle cx="4" cy="12" r="1" fill="currentColor"/><circle cx="4" cy="18" r="1" fill="currentColor"/></svg></button>
        <button class="tb-btn" data-cmd="insertOrderedList" title="Numaralı liste"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><path d="M4 6h1v4"/><path d="M4 10h2"/><path d="M6 18H4c0-1 2-2 2-3s-1-1.5-2-1"/></svg></button>
        <button class="tb-btn" data-cmd="blockquote"    title="Alıntı — tekrar basınca kaldırır"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"/></svg></button>
        <div class="tb-sep"></div>
        <!-- Ekle -->
        <button class="tb-btn" data-cmd="insertHR"      title="Yatay çizgi"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/></svg></button>
        <button class="tb-btn" data-cmd="insertTable"   title="Tablo ekle"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M3 15h18"/><path d="M9 3v18"/><path d="M15 3v18"/></svg></button>
        <button class="tb-btn" data-cmd="insertImage"   title="Görsel ekle (URL)"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></button>
        <div class="tb-sep"></div>
        <!-- Link -->
        <button class="tb-btn" data-cmd="createLink"    title="Link ekle (Ctrl+K)"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg></button>
        <button class="tb-btn" data-cmd="unlink"        title="Link kaldır"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18.84 12.25l1.72-1.71h-.02a5.004 5.004 0 0 0-.12-7.07 5.006 5.006 0 0 0-6.95 0l-1.72 1.71"/><path d="M5.17 11.75l-1.71 1.71a5.004 5.004 0 0 0 .12 7.07 5.006 5.006 0 0 0 6.95 0l1.71-1.71"/><line x1="8" y1="2" x2="8" y2="5"/><line x1="2" y1="8" x2="5" y2="8"/><line x1="16" y1="19" x2="16" y2="22"/><line x1="19" y1="16" x2="22" y2="16"/></svg></button>
        <div class="tb-sep"></div>
        <button class="tb-btn" data-cmd="removeFormat"  title="Formatı temizle"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z"/><line x1="3" y1="21" x2="17" y2="7"/></svg></button>
      </div>

      <textarea id="editorTitle" class="editor-title-input" placeholder="Yazı başlığı…" rows="2" spellcheck="false"></textarea>

      <div
        id="editorContent"
        class="editor-content"
        contenteditable="true"
        data-placeholder="Yazmaya başla… Metni seçip araç çubuğunu kullanabilirsin."
        spellcheck="false"
      ></div>

      <div class="editor-footer-bar">
        <span id="wordCountDisplay">0 kelime</span>
        <span id="autoSaveStatus">—</span>
      </div>
    </div>

    <!-- Sağ: sidebar -->
    <div class="editor-sidebar">

      <!-- Yayınlama -->
      <div class="sidebar-card">
        <div class="sidebar-card-title">Yayın</div>
        <div class="status-row status-draft" id="postStatusRow">
          <span class="status-dot"></span>
          <span id="postStatusText">Taslak</span>
        </div>
        <button class="btn-publish" id="btnPublish">Yayınla →</button>
        <button class="btn-draft"   id="btnSaveDraft">Taslak Kaydet</button>
        <button class="btn-back-list" id="btnEditorBack">← Listeye Dön</button>
      </div>

      <!-- Kapak görseli -->
      <div class="sidebar-card">
        <div class="sidebar-card-title">Kapak Görseli</div>
        <div class="cover-upload-area" id="coverUploadArea">
          <span class="cover-upload-icon">🖼</span>
          <span class="cover-upload-text">Görsel seç veya sürükle</span>
          <span style="font-size:10px;color:var(--text-3);margin-top:2px;">Max 8MB · Otomatik sıkıştırılır</span>
          <img id="coverPreview" src="" alt="" style="display:none">
          <button class="cover-remove-btn" id="coverRemoveBtn" style="display:none" title="Görseli kaldır">✕</button>
        </div>
        <input type="file" id="coverInput" class="cover-upload-input" accept="image/*">
      </div>

      <!-- Meta -->
      <div class="sidebar-card">
        <div class="sidebar-card-title">Meta</div>
        <label class="field-label">Kategori / Etiket</label>
        <input type="text" id="fieldTag" class="field-input" placeholder="ör. Gramer, A1, İpuçları" style="margin-bottom:12px">
        <label class="field-label">Özet (isteğe bağlı)</label>
        <input type="text" id="fieldExcerpt" class="field-input" placeholder="Kısa açıklama…">
      </div>

    </div>
  </div>
</div>

<!-- Delete confirm -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-card">
    <div class="confirm-title">Yazıyı Sil</div>
    <p class="confirm-desc">Bu yazı kalıcı olarak silinecek. Bu işlem geri alınamaz.</p>
    <div class="confirm-actions">
      <button class="btn-confirm-cancel" id="confirmCancel">İptal</button>
      <button class="btn-confirm-delete" id="confirmDelete">Evet, Sil</button>
    </div>
  </div>
</div>

<script type="module">
  import "../js/core.js";
  window.loadNavbar();
</script>

<script type="module">
  // Bir üstteki js klasörüne git dedik (../)
  import { onAuthChange } from "../js/firebase.js";
  import "../js/blog.js"; 

  onAuthChange((user) => {
    if (user) {
      console.log("Blog sistemi hazır, kullanıcı:", user.email);
    } else {
      console.log("Giriş yapılmış bir kullanıcı yok.");
    }
  });
</script>
</body>
</html>
