<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Okuma Modu — AlmancaPratik</title>
  <link rel="icon" href="../favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="./okuma.css">
</head>
<body>

<div class="ok-bg" aria-hidden="true"></div>

<header class="ok-toolbar" id="okToolbar">
  <div class="ok-tb-left">
    <button class="ok-btn ok-btn-back" id="backBtn" title="Geri dön">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
      <span>Geri</span>
    </button>
    <button class="ok-btn ok-btn-word" id="addWordBtn" title="Seçili kelimeyi kaydet">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/>
      </svg>
      <span>Kelime Ekle</span>
    </button>
  </div>

  <div class="ok-tb-center">
    <span class="ok-tb-title">Okuma Modu</span>
    <span class="ok-tb-meta" id="readingMeta"></span>
  </div>

  <div class="ok-tb-right">
    <button class="ok-btn ok-btn-icon" id="fontDecBtn"    title="Küçült">A<sup>−</sup></button>
    <button class="ok-btn ok-btn-icon" id="fontIncBtn"    title="Büyüt">A<sup>+</sup></button>
    <button class="ok-btn ok-btn-icon" id="fontToggleBtn" title="Yazı tipi">Tf</button>
    <button class="ok-btn ok-btn-icon" id="themeBtn"      title="Tema">&#9728;</button>
    <button class="ok-btn ok-btn-icon" id="focusBtn"      title="Odak modu">&#8865;</button>
  </div>
</header>

<div class="ok-progress" id="okProgress">
  <div class="ok-progress-fill" id="okProgressFill"></div>
</div>

<!-- ══ SESLİ OKUMA ÇUBUĞU ══════════════════════════════════ -->
<div class="tts-bar" id="ttsBar">

  <!-- Sol: oynat / duraklat / durdur -->
  <div class="tts-controls">
    <button class="tts-btn tts-play" id="ttsPlayBtn" title="Tüm metni oku">
      <!-- Play ikonu — JS değiştirir -->
      <svg class="tts-icon-play" width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
        <polygon points="5,3 19,12 5,21"/>
      </svg>
      <svg class="tts-icon-pause" width="15" height="15" viewBox="0 0 24 24" fill="currentColor" style="display:none">
        <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
      </svg>
      <span class="tts-play-label">Oku</span>
    </button>

    <button class="tts-btn tts-stop" id="ttsStopBtn" title="Durdur ve sıfırla" disabled>
      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor">
        <rect x="4" y="4" width="16" height="16" rx="2"/>
      </svg>
    </button>
  </div>

  <!-- Orta: seçimden oku + hız -->
  <div class="tts-middle">
    <button class="tts-sel-btn" id="ttsSelBtn" title="Seçili metni oku">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <path d="M9 12h6M9 16h6M9 8h4"/>
        <rect x="3" y="3" width="18" height="18" rx="3"/>
      </svg>
      Seçimi Oku
    </button>

    <!-- Hız seçici -->
    <div class="tts-rate-wrap">
      <span class="tts-rate-label">Hız</span>
      <div class="tts-rate-btns">
        <button class="tts-rate-btn" data-rate="0.7">0.7×</button>
        <button class="tts-rate-btn active" data-rate="1.0">1×</button>
        <button class="tts-rate-btn" data-rate="1.25">1.25×</button>
        <button class="tts-rate-btn" data-rate="1.5">1.5×</button>
      </div>
    </div>
  </div>

  <!-- Sağ: ses göstergesi + dil etiketi -->
  <div class="tts-right">
    <div class="tts-wave" id="ttsWave" aria-hidden="true">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
    <span class="tts-lang-badge">DE</span>
  </div>

</div>
<!-- ══════════════════════════════════════════════════════════ -->

<main class="ok-main">
  <article class="ok-card">
    <div id="readerBody" class="ok-body"></div>
  </article>
</main>

<button id="floatingMeaningBtn" class="ok-meaning-btn" style="display:none" aria-label="Kelime anlamı">
  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
    <circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/>
  </svg>
  Anlam
</button>

<div id="meaningPopup" class="ok-popup" style="display:none"></div>

<!-- Kelime kaydetme modalı -->
<div class="ok-modal-overlay" id="wordModalOverlay" style="display:none" role="dialog" aria-modal="true">
  <div class="ok-modal">
    <div class="ok-modal-head">
      <span class="ok-modal-label">Kelimeyi Kaydet</span>
      <button class="ok-modal-x" id="wordModalClose" aria-label="Kapat">&#x2715;</button>
    </div>
    <div class="ok-modal-word-row">
      <span id="modalArticleBadge" class="ok-modal-badge"></span>
      <div id="okumLemmaMount"></div>
      <input type="text" id="modalWordInput" class="ok-modal-word-input"
        autocomplete="off" spellcheck="false" lang="de" placeholder="Kelime…"/>
    </div>
    <div class="ok-base-row" id="modalBaseFormWrap" style="display:none">
      <span>Temel form: <strong id="modalBaseFormText" class="ok-mono"></strong></span>
      <button class="ok-base-apply" id="applyBaseFormBtn">kullan &#x2192;</button>
    </div>
    <input type="text" id="modalMeaningInput" class="ok-modal-input"
      placeholder="Türkçe anlamını gir…" autocomplete="off"/>
    <div class="ok-modal-tags">
      <div class="ok-tag-label">Etiket <span class="ok-tag-opt">(opsiyonel)</span></div>
      <div class="ok-tag-chips" id="modalTagChips"></div>
    </div>
    <div class="ok-modal-actions">
      <button class="ok-modal-cancel" id="wordModalCancelBtn">İptal</button>
      <button class="ok-modal-save"   id="wordModalSaveBtn">Kaydet</button>
    </div>
  </div>
</div>

<script type="module">
  import "../js/core.js";
  window.loadNavbar();
</script>
<script type="module" src="./okuma.js"></script>

</body>
</html>
