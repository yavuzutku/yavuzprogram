<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Almanca Öğrenme Programı</title>
<style>
body{
  margin:0;
  font-family:'DM Sans',sans-serif;
  background:#0a0a0f;
  color:white;
}

.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 40px;
  background:#12121a;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.logo{
  font-size:20px;
  font-weight:600;
}

.logout-btn{
  padding:8px 16px;
  background:#c9a84c;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:500;
}

.center{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:80vh;
  gap:30px;
}

.title{
  font-size:40px;
  font-weight:700;
}

.new-btn{
  padding:16px 36px;
  font-size:18px;
  background:#c9a84c;
  border:none;
  border-radius:12px;
  cursor:pointer;
  transition:0.2s;
}

.new-btn:hover{
  transform:scale(1.05);
}
</style>
</head>
<body>

<div class="navbar">
  <div class="logo">YavuzProgram</div>
  <button class="logout-btn" onclick="logout()">Çıkış Yap</button>
</div>

<div class="center">
  <div class="title">Almanca Öğrenme Programı</div>
  <button class="new-btn" onclick="goNew()">Yeni Metin Girişi</button>
</div>

<script>
function logout(){
  localStorage.removeItem("userToken");
  window.location.href = "index.html";
}

function goNew(){
  window.location.href = "metin.html";
}
</script>

</body>
</html>
<script src="js/core.js"></script>
<script>
requireAuth();
</script>
