<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Listelerim — AlmancaPratik</title>
  <meta name="description" content="Oluşturduğun Almanca kelime listelerini görüntüle, düzenle ve yönet.">
  <meta name="robots" content="noindex, follow">
  <meta name="theme-color" content="#0a0a0f">
  <link rel="icon" href="../favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="./listeler.css">
</head>
<body>

<div class="page-wrapper">

  <!-- ÜST BAR -->
  <header class="page-header">
    <button class="back-btn" onclick="window.location.href='../kelimeler/'" aria-label="Kelime bankasına dön">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Kelimelerim
    </button>

    <div class="page-header-center">
      <h1 class="page-title">Listelerim</h1>
    </div>

    <div class="page-header-right">
      <span class="liste-count-badge" id="listeCountBadge" aria-live="polite">—</span>
      <button class="create-list-header-btn" id="createListHeaderBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span>Yeni Liste</span>
      </button>
    </div>
  </header>

  <!-- Açıklama -->
  <section class="page-intro">
    <p class="page-intro-text">
      Kelimelerini gruplandır, tematik listeler oluştur. A2 fiilleri, seyahat kelimeleri, 
      iş hayatı — her konu için ayrı liste.
    </p>
  </section>

  <!-- Arama -->
  <div class="liste-search-bar">
    <div class="search-input-wrap">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="search" id="listeSearch" placeholder="Liste ara…" autocomplete="off" spellcheck="false"/>
    </div>
  </div>

  <!-- Liste grid -->
  <main id="listeGrid" class="liste-grid" role="list" aria-label="Kelime listeleri">
    <!-- Yükleniyor -->
    <div class="loading-state" id="loadingState">
      <div class="loading-spinner"></div>
      <span>Listeler yükleniyor…</span>
    </div>
    <!-- Boş durum -->
    <div class="empty-state" id="emptyState" style="display:none">
      <div class="empty-illustration">
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
          <rect x="8" y="12" width="48" height="40" rx="6" stroke="currentColor" stroke-width="1.5" stroke-dasharray="4 3"/>
          <line x1="20" y1="24" x2="44" y2="24" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="20" y1="32" x2="36" y2="32" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="20" y1="40" x2="30" y2="40" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="empty-title">Henüz liste oluşturmadın</div>
      <div class="empty-desc">Kelime bankandaki kelimeleri gruplandırarak tematik listeler oluştur.</div>
      <button class="empty-cta" id="emptyCta">İlk Listeni Oluştur</button>
    </div>
  </main>

</div>

<script type="module">
  import "../js/core.js";
  window.loadNavbar?.();
  import { initAuthWall } from '../src/components/authWall.js';
  initAuthWall({
    icon:     'L',
    title:    'Listelerini görmek için giriş yap',
    desc:     'Kelimelerini gruplayarak tematik listeler oluştur ve yönet.',
    features: ['Tematik listeler', 'Kelime gruplandırma', 'Kolay erişim'],
    backHref: '../pratik/'
  });
</script>
<script type="module" src="./listeler.js"></script>

</body>
</html>
