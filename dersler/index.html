<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dersler — AlmancaPratik</title>
  <meta name="description" content="AlmancaPratik Almanca dersleri. A1'den C1'e kategorilere göre yapılandırılmış Almanca ders içerikleri.">
  <link rel="canonical" href="https://almancapratik.com/dersler/">
  <link rel="icon" href="../favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/dersler.css">
</head>
<body>

<div class="bg-canvas" aria-hidden="true">
  <div class="bg-grid"></div>
  <div class="bg-glow bg-glow--1"></div>
  <div class="bg-glow bg-glow--2"></div>
</div>

<!-- ══════════════ LIST VIEW ══════════════ -->
<div id="viewList">
  <div class="page-wrap">

    <div class="page-header">
      <div class="page-header-left">
        <div class="page-eyebrow"><span class="eyebrow-dot"></span>AlmancaPratik</div>
        <h1 class="page-title">Dersler</h1>
      </div>
      <button class="btn-new-lesson" id="btnNewLesson" style="display:none">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Yeni Ders
      </button>
    </div>

    <!-- Kategori filtreleri -->
    <div class="cat-filter-wrap" id="catFilterWrap">
      <button class="cat-filter-btn active" data-cat="all">Tümü</button>
      <button class="cat-filter-btn" data-cat="A1">A1</button>
      <button class="cat-filter-btn" data-cat="A2">A2</button>
      <button class="cat-filter-btn" data-cat="B1">B1</button>
      <button class="cat-filter-btn" data-cat="B2">B2</button>
      <button class="cat-filter-btn" data-cat="C1">C1</button>
      <!-- Özel kategoriler JS ile eklenir -->
    </div>

    <div class="lessons-grid" id="lessonsGrid">
      <div class="grid-loading"><div class="spinner"></div></div>
    </div>

  </div>
</div>

<!-- ══════════════ DERS OKUMA VIEW ══════════════ -->
<div id="viewLesson">
  <div class="lesson-wrap">

    <div class="lesson-nav-row">
      <button class="lesson-back" id="btnBackFromLesson">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
        Tüm dersler
      </button>
      <div class="lesson-admin-actions" id="lessonAdminActions" style="display:none">
        <button class="lesson-admin-btn" id="btnEditCurrentLesson">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          Düzenle
        </button>
        <button class="lesson-admin-btn lesson-admin-btn--danger" id="btnDeleteCurrentLesson">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          Sil
        </button>
      </div>
    </div>

    <img id="lessonHeroImg" class="lesson-hero-img" src="" alt="" style="display:none">

    <div class="lesson-meta-row">
      <span class="lesson-cat-badge" id="lessonCatBadge" style="display:none"></span>
      <span id="lessonDate"></span>
      <span class="lesson-card-dot"></span>
      <span id="lessonReadTime"></span>
      <span class="draft-badge" id="lessonDraftBadge" style="display:none">Taslak</span>
    </div>

    <h1 class="lesson-heading" id="lessonHeading"></h1>
    <div class="lesson-body" id="lessonBody"></div>

  </div>
</div>

<!-- ══════════════ EDITOR VIEW ══════════════ -->
<div id="viewEditor">
  <div class="editor-wrap">

    <!-- Sol: editör -->
    <div class="editor-main">
      <div class="editor-toolbar">
        <select class="tb-select tb-select--wide" id="tbFontFamily" title="Yazı tipi">
          <option value="">Yazı tipi</option>
          <option value="DM Sans, sans-serif">DM Sans</option>
          <option value="Lora, Georgia, serif">Lora</option>
          <option value="Playfair Display, Georgia, serif">Playfair</option>
          <option value="Merriweather, Georgia, serif">Merriweather</option>
          <option value="Courier Prime, monospace">Courier Prime</option>
        </select>
        <div class="tb-sep"></div>
        <button class="tb-btn" data-cmd="undo" title="Geri al"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg></button>
        <button class="tb-btn" data-cmd="redo" title="Yinele"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3L21 13"/></svg></button>
        <div class="tb-sep"></div>
        <select class="tb-select" id="tbFontSize" title="Boyut">
          <option value="">Boyut</option>
          <option value="1">Küçük</option><option value="3">Normal</option>
          <option value="4">Büyük</option><option value="5">Çok Büyük</option>
        </select>
        <div class="tb-sep"></div>
        <button class="tb-btn" data-cmd="bold" title="Kalın"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/><path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/></svg></button>
        <button class="tb-btn" data-cmd="italic" title="İtalik"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="4" x2="10" y2="4"/><line x1="14" y1="20" x2="5" y2="20"/><line x1="15" y1="4" x2="9" y2="20"/></svg></button>
        <button class="tb-btn" data-cmd="underline" title="Altı çizili"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3v7a6 6 0 0 0 6 6 6 6 0 0 0 6-6V3"/><line x1="4" y1="21" x2="20" y2="21"/></svg></button>
        <div class="tb-highlight-wrap" id="tbHighlightWrap">
          <button class="tb-highlight-btn" id="tbHighlightBtn" title="Vurgula (renk seç)">H</button>
          <div class="tb-color-palette" id="tbColorPalette">
            <!-- Swatchlar JS tarafından buildHighlightPalette() ile eklenir -->
          </div>
        </div>        
        <div class="tb-sep"></div>
        <button class="tb-btn" data-cmd="h2" title="H2">H2</button>
        <button class="tb-btn" data-cmd="h3" title="H3">H3</button>
        <div class="tb-sep"></div>
        <button class="tb-btn" data-cmd="insertUnorderedList" title="Liste"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><circle cx="4" cy="6" r="1" fill="currentColor"/><circle cx="4" cy="12" r="1" fill="currentColor"/><circle cx="4" cy="18" r="1" fill="currentColor"/></svg></button>
        <button class="tb-btn" data-cmd="insertOrderedList" title="Numaralı liste"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><path d="M4 6h1v4"/><path d="M4 10h2"/><path d="M6 18H4c0-1 2-2 2-3s-1-1.5-2-1"/></svg></button>
        <button class="tb-btn" data-cmd="blockquote" title="Alıntı"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/></svg></button>
        <div class="tb-sep"></div>
        <button class="tb-btn" data-cmd="insertHR" title="Çizgi"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/></svg></button>
        <button class="tb-btn" data-cmd="insertTable" title="Tablo"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M3 15h18"/><path d="M9 3v18"/><path d="M15 3v18"/></svg></button>
        <button class="tb-btn" data-cmd="createLink" title="Link"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg></button>
        <div class="tb-sep"></div>
        <button class="tb-btn" data-cmd="removeFormat" title="Formatı temizle"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z"/><line x1="3" y1="21" x2="17" y2="7"/></svg></button>
      </div>

      <textarea id="editorTitle" class="editor-title-input" placeholder="Ders başlığı…" rows="2" spellcheck="false"></textarea>

      <div id="editorContent" class="editor-content" contenteditable="true"
        data-placeholder="Ders içeriğini yazmaya başla…" spellcheck="false"></div>

      <div class="editor-footer-bar">
        <span id="wordCountDisplay">0 kelime</span>
        <span id="autoSaveStatus">—</span>
      </div>
    </div>

    <!-- Sağ: sidebar -->
    <div class="editor-sidebar">

      <!-- Yayınlama -->
      <div class="sidebar-card">
        <div class="sidebar-card-title">Yayın</div>
        <div class="status-row status-draft" id="lessonStatusRow">
          <span class="status-dot"></span>
          <span id="lessonStatusText">Taslak</span>
        </div>
        <button class="btn-publish" id="btnPublish">Yayınla →</button>
        <button class="btn-draft" id="btnSaveDraft">Taslak Kaydet</button>
        <button class="btn-back-list" id="btnEditorBack">← Listeye Dön</button>
      </div>

      <!-- Kapak görseli -->
      <div class="sidebar-card">
        <div class="sidebar-card-title">Kapak Görseli</div>
      
        <!-- Sekme seçimi: Dosya / URL -->
        <div class="cover-tabs">
          <button class="cover-tab active" id="coverTabFile">📁 Dosyadan</button>
          <button class="cover-tab"        id="coverTabUrl" >🔗 URL ile</button>
        </div>
      
        <!-- Dosya yükleme (varsayılan görünür) -->
        <div class="cover-upload-area" id="coverUploadArea">
          <span class="cover-upload-icon">🖼</span>
          <span class="cover-upload-text">Görsel seç veya sürükle</span>
          <span style="font-size:10px;color:var(--text-muted);margin-top:2px;">
            Max 8MB · En-boy oranı korunur
          </span>
          <img id="coverPreview" src="" alt="" style="display:none">
          <button class="cover-remove-btn" id="coverRemoveBtn" style="display:none" title="Kaldır">✕</button>
        </div>
      
        <!-- URL girişi (gizli; sekme ile açılır) -->
        <div class="cover-url-area" id="coverUrlArea">
          <div class="cover-url-input-wrap">
            <input
              type="url"
              id="coverUrlInput"
              class="cover-url-input"
              placeholder="https://example.com/gorsel.jpg"
              autocomplete="off"
            />
            <button class="cover-url-apply" id="coverUrlApply">Uygula</button>
          </div>
          <img id="coverUrlPreview" class="cover-url-preview" src="" alt="Önizleme">
          <button class="cover-url-clear" id="coverUrlClear">✕ Görseli Kaldır</button>
        </div>
      
        <input type="file" id="coverInput" class="cover-upload-input" accept="image/*">
      </div>

      <!-- Meta -->
      <div class="sidebar-card">
        <div class="sidebar-card-title">Meta</div>

        <label class="field-label">Kategori</label>
        <select id="fieldCategory" class="field-select" style="margin-bottom:12px">
          <option value="">Seç veya özel gir</option>
          <option value="A1">A1 — Başlangıç</option>
          <option value="A2">A2 — Temel</option>
          <option value="B1">B1 — Orta</option>
          <option value="B2">B2 — Üst Orta</option>
          <option value="C1">C1 — İleri</option>
          <option value="__custom__">+ Özel kategori…</option>
        </select>

        <div id="customCatWrap" style="display:none;margin-bottom:12px;">
          <label class="field-label">Özel Kategori Adı</label>
          <input type="text" id="fieldCustomCategory" class="field-input" placeholder="ör. Gramer, Konuşma…">
        </div>

        <label class="field-label">Özet (isteğe bağlı)</label>
        <input type="text" id="fieldExcerpt" class="field-input" placeholder="Kısa açıklama…">
      </div>

    </div>
  </div>
</div>

<!-- Silme onayı -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-card">
    <div class="confirm-title">Dersi Sil</div>
    <p class="confirm-desc">Bu ders kalıcı olarak silinecek. Bu işlem geri alınamaz.</p>
    <div class="confirm-actions">
      <button class="btn-confirm-cancel" id="confirmCancel">İptal</button>
      <button class="btn-confirm-delete" id="confirmDelete">Evet, Sil</button>
    </div>
  </div>
</div>

<!-- Navbar -->
<script type="module">
  import "../js/core.js";
  window.loadNavbar();
</script>

<!-- Dersler logic -->
<script type="module" src="../js/dersler.js"></script>

</body>
</html>
