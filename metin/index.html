<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yeni Metin — AlmancaPratik</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="./metin.css">
</head>
<body>

<div class="bg-pattern" aria-hidden="true"></div>

<!-- Sub-toolbar -->
<div class="metin-toolbar" id="metinToolbar">
  <button class="toolbar-back-btn" onclick="history.back()" title="Geri dön">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 12H5M12 5l-7 7 7 7"/>
    </svg>
    Geri
  </button>
  <span class="toolbar-title">Metin Editörü</span>
  <div class="toolbar-save" id="autosave-indicator">
    <span class="save-dot" id="saveDot"></span>
    <span id="saveLabel">Kaydedilmedi</span>
  </div>
</div>

<!-- Ana layout -->
<main class="main-layout">

  <!-- Sol panel -->
  <aside class="sidebar">

    <div class="sidebar-card">
      <h3 class="sidebar-title">İstatistikler</h3>
      <div class="stat-row"><span class="stat-label">Kelime</span><span class="stat-val" id="statWords">0</span></div>
      <div class="stat-row"><span class="stat-label">Karakter</span><span class="stat-val" id="statChars">0</span></div>
      <div class="stat-row"><span class="stat-label">Cümle</span><span class="stat-val" id="statSentences">0</span></div>
      <div class="stat-row"><span class="stat-label">Okuma süresi</span><span class="stat-val" id="statTime">0 dk</span></div>
    </div>


    <!-- ✦ YENİ: Geçmiş Metinler kartı ─────────────────────── -->
    <div class="sidebar-card sidebar-card--history">
      <div class="sidebar-history-header">
        <h3 class="sidebar-title" style="margin:0">Geçmiş Metinler</h3>
        <a href="../gecmis/" class="sidebar-history-all" title="Tüm geçmişi gör">
          Tümü →
        </a>
      </div>
      <div id="sidebarHistory" class="sidebar-history">
        <div class="sidebar-history-empty">Yükleniyor…</div>
      </div>
    </div>
    <!-- ────────────────────────────────────────────────────── -->

  </aside>

  <!-- Editör alanı -->
  <section class="editor-section">
    <div class="editor-header">
      <div class="editor-label">Almanca Metin</div>
      <div class="editor-actions">
        <button class="action-pill" id="btnPreview">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          Önizle
        </button>
        <div class="char-progress-wrap">
          <span id="charCount">0</span>
          <span style="color:var(--muted)"> / 50k</span>
        </div>
      </div>
    </div>

    <div class="editor-wrap">
      <div
        id="textArea"
        contenteditable="true"
        data-placeholder="Almanca metninizi buraya yapıştırın veya yazın…"
        spellcheck="false"
        lang="de"
      ></div>
    </div>

    <div class="editor-footer">
      <button class="read-btn" id="goReadBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>
        Okuma Moduna Geç
      </button>
    </div>
  </section>

</main>

<!-- Önizleme Modal -->
<div class="preview-modal" id="previewModal" role="dialog" aria-modal="true" aria-label="Metin Önizleme">
  <div class="preview-backdrop" id="previewBackdrop"></div>
  <div class="preview-panel">
    <div class="preview-top">
      <span class="preview-title">Metin Önizleme</span>
      <button class="preview-close" id="previewClose" aria-label="Kapat">✕</button>
    </div>
    <div class="preview-content" id="previewContent"></div>
  </div>
</div>

<script type="module">
  import "../js/core.js";
  window.loadNavbar();
</script>
<script type="module" src="./metin.js"></script>

</body>
</html>
