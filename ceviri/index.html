<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Almanca Türkçe Çeviri — Artikel & Örnek Cümleli Sözlük | AlmancaPratik</title>
  <meta name="description" content="Almanca kelimeleri Türkçeye çevir, der die das artikelini öğren, örnek cümleleri gör ve tek tıkla kişisel sözlüğüne ekle. Wiktionary destekli ücretsiz çeviri.">
  <meta name="keywords" content="almanca türkçe çeviri, almanca kelime çeviri, almanca sözlük türkçe, wiktionary almanca, almanca artikel çeviri">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://almancapratik.com/ceviri/">

  <meta property="og:type"        content="website">
  <meta property="og:url"         content="https://almancapratik.com/ceviri/">
  <meta property="og:title"       content="Almanca-Türkçe Çeviri & Sözlük — AlmancaPratik">
  <meta property="og:description" content="Almanca kelimeleri çevir, artikelini öğren, örnek cümleleri gör, sözlüğüne ekle. Wiktionary destekli ücretsiz araç.">
  <meta property="og:locale"      content="tr_TR">
  <meta property="og:site_name"   content="AlmancaPratik">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Almanca-Türkçe Çeviri Aracı",
    "url": "https://almancapratik.com/ceviri/",
    "description": "Almanca-Türkçe çeviri, artikel bilgisi ve örnek cümleler sunan ücretsiz dil öğrenme aracı.",
    "applicationCategory": "EducationalApplication",
    "inLanguage": "tr",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "TRY" },
    "breadcrumb": {
      "@type": "BreadcrumbList",
      "itemListElement": [
        { "@type": "ListItem", "position": 1, "name": "Ana Sayfa", "item": "https://almancapratik.com/" },
        { "@type": "ListItem", "position": 2, "name": "Çeviri", "item": "https://almancapratik.com/ceviri/" }
      ]
    }
  }
  </script>

  <link rel="icon" href="../favicon.ico">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/ceviri.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<!-- ── Arka plan ── -->
<div class="bg-canvas" aria-hidden="true">
  <div class="bg-grid"></div>
  <div class="bg-glow bg-glow--1"></div>
  <div class="bg-glow bg-glow--2"></div>
</div>

<div class="page-wrap">

  <div class="top-bar">
    <button class="back-btn" onclick="window.location.href='../anasayfa/'">← Geri</button>
    <!-- H1 yerine sayfa başlığı — asıl H1 aşağıda görünmez gizli -->
    <h1 class="page-title">Almanca Çeviri</h1>
    <button class="history-toggle-btn" id="historyToggleBtn" aria-label="Çeviri geçmişi">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span>Geçmiş</span>
    </button>
  </div>

  <div class="main-layout">

    <div class="translate-panel">

      <div class="lang-selector">
        <button class="lang-btn active" id="langDeBtn" data-dir="de-tr">
          🇩🇪 <span>Almanca → Türkçe</span>
        </button>
        <button class="lang-swap-btn" id="langSwapBtn" title="Dilleri değiştir" aria-label="Dilleri değiştir">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 16V4m0 0L3 8m4-4l4 4"/><path d="M17 8v12m0 0l4-4m-4 4l-4-4"/></svg>
        </button>
        <button class="lang-btn" id="langTrBtn" data-dir="tr-de">
          🇹🇷 <span>Türkçe → Almanca</span>
        </button>
      </div>

      <div class="input-wrap">
        <textarea id="sourceInput" class="source-input"
          placeholder="Çevirmek istediğin Almanca kelimeyi veya cümleyi yaz…"
          rows="3" maxlength="500" autocomplete="off" spellcheck="false"
          aria-label="Çeviri için metin girin"></textarea>
        <div class="input-footer">
          <span class="char-count" id="charCount">0 / 500</span>
          <div class="input-actions">
            <button class="icon-btn" id="clearBtn" title="Temizle" aria-label="Giriş alanını temizle">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
            <button class="translate-btn" id="translateBtn">
              <span id="translateBtnText">Çevir</span>
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            </button>
          </div>
        </div>
      </div>

      <div class="result-wrap" id="resultWrap" style="display:none">
        <div class="result-header">
          <span class="result-label">Çeviri</span>
          <div class="result-actions">
            <button class="icon-btn" id="copyBtn" title="Kopyala" aria-label="Çeviriyi kopyala">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </button>
            <button class="save-word-btn" id="saveWordBtn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
              Sözlüğe Ekle
            </button>
          </div>
        </div>
        <div class="result-main" id="resultMain">—</div>
        <div class="alt-translations" id="altTranslations" style="display:none">
          <div class="alt-label">Diğer anlamlar</div>
          <div class="alt-chips" id="altChips"></div>
        </div>
      </div>

      <div class="error-wrap" id="errorWrap" style="display:none">
        <span id="errorMsg"></span>
      </div>

      <div class="loading-wrap" id="loadingWrap" style="display:none">
        <div class="loading-dots"><span></span><span></span><span></span></div>
        <span>Çevriliyor…</span>
      </div>

    </div>

    <div class="detail-panel" id="detailPanel">
      <div class="detail-empty" id="detailEmpty">
        <div class="detail-empty-icon">🔍</div>
        <p>Bir kelime çevir, artikel ve örnek cümlelerini burada gör.</p>
      </div>
      <div class="detail-content" id="detailContent" style="display:none">
        <div class="word-info-card" id="wordInfoCard">
          <div class="word-info-header">
            <span class="word-artikel" id="wordArtikel"></span>
            <span class="word-display" id="wordDisplay"></span>
          </div>
          <div class="word-meta" id="wordMeta"></div>
        </div>
        <div class="examples-section" id="examplesSection" style="display:none">
          <div class="section-title">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            Örnek Cümleler
          </div>
          <div class="examples-list" id="examplesList"></div>
        </div>
        <a class="wiktionary-link" id="wiktionaryLink" href="#" target="_blank" rel="noopener noreferrer" style="display:none">
          Wiktionary'de aç →
        </a>
      </div>
      <div class="detail-loading" id="detailLoading" style="display:none">
        <div class="loading-dots"><span></span><span></span><span></span></div>
        <span>Detaylar yükleniyor…</span>
      </div>
    </div>

  </div>

  <div class="history-panel" id="historyPanel" style="display:none">
    <div class="history-header">
      <span class="history-title">Son Çeviriler</span>
      <button class="clear-history-btn" id="clearHistoryBtn">Temizle</button>
    </div>
    <div class="history-list" id="historyList">
      <div class="history-empty">Henüz çeviri yapılmadı.</div>
    </div>
  </div>

</div>

<div class="modal-overlay" id="saveModal" style="display:none" role="dialog" aria-modal="true" aria-label="Sözlüğe ekle">
  <div class="modal-card">
    <div class="modal-header">
      <span class="modal-title">Sözlüğe Ekle</span>
      <button class="modal-close" id="modalClose" aria-label="Kapat">✕</button>
    </div>
    <div class="modal-field">
      <label class="modal-label">Kelime</label>
      <input class="modal-input" id="modalWord" type="text" placeholder="Almanca kelime" autocomplete="off">
    </div>
    <div class="modal-field">
      <label class="modal-label">Anlam</label>
      <input class="modal-input" id="modalMeaning" type="text" placeholder="Türkçe anlam" autocomplete="off">
    </div>
    <div class="modal-field">
      <label class="modal-label">Etiketler</label>
      <div class="tag-chips-wrap" id="modalTagChips"></div>
    </div>
    <div class="modal-status" id="modalStatus" style="display:none"></div>
    <div class="modal-actions">
      <button class="modal-cancel-btn" id="modalCancelBtn">İptal</button>
      <button class="modal-save-btn" id="modalSaveBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        Kaydet
      </button>
    </div>
  </div>
</div>

<script type="module">
  import "../js/core.js";
  window.requireAuth();
  window.loadNavbar();
</script>
<script type="module" src="../js/ceviri.js"></script>

</body>
</html>
