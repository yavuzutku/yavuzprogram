<!-- SCRIPTS -->
<script type="module">
  import "../js/core.js";
  window.loadNavbar();
</script>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const go = (id, url) => {
    const el = document.getElementById(id);
    if (el) el.addEventListener("click", () => window.location.href = url);
  };
  go("quizBtn",       "../quiz/");
  go("newTextBtn",    "../metin/");
  go("kelimelerBtn",  "../kelimeler/");
  go("kelimeEkleBtn", "../wordsadd/");
  go("artikelBtn",    "../artikel/");
  go("cumlebulBtn",   "../cumlebul/");
  go("ceviriBtn",     "../ceviri/");
  go("sponsorBtn",    "../sponsorlar/");
});
</script>

<!-- İstatistikler -->
<script type="module">
  import { getWords, getMetinler, onAuthChange } from "../js/firebase.js";

  onAuthChange(async (user) => {
    if (!user) return;
    ["statWords","statTexts","statQuizzes"].forEach(id => {
      document.getElementById(id).textContent = "…";
    });
    try {
      const [words, texts] = await Promise.all([
        getWords(user.uid), getMetinler(user.uid)
      ]);
      const uniqueTags = new Set(words.flatMap(w => w.tags || []));
      animateCount("statWords",   words.length);
      animateCount("statTexts",   texts.length);
      animateCount("statQuizzes", uniqueTags.size);
    } catch {
      ["statWords","statTexts","statQuizzes"].forEach(id => {
        document.getElementById(id).textContent = "—";
      });
    }
  });

  function animateCount(id, target) {
    const el = document.getElementById(id);
    if (!el || target === 0) { if(el) el.textContent = "0"; return; }
    let current = 0;
    const timer = setInterval(() => {
      current += target / 50;
      el.textContent = Math.floor(current).toLocaleString("tr");
      if (current >= target) { el.textContent = target.toLocaleString("tr"); clearInterval(timer); }
    }, 16);
  }
</script>

<!-- Admin AI butonu -->
<script type="module">
  import { onAdminChange } from "../src/admin.js";
  onAdminChange((adminStatus) => {
    const btn = document.getElementById("aiBtn");
    if (!btn) return;
    if (adminStatus) {
      btn.classList.remove("hidden");
      if (!btn._adminBound) {
        btn._adminBound = true;
        btn.addEventListener("click", () => window.location.href = "../ai/");
      }
    } else {
      btn.classList.add("hidden");
    }
  });
</script>
