<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Metin Okuma</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/okuma.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="reader-container">
  <div class="reader-card">
    <div id="readerText"></div>
  </div>
</div>

<!-- Sol toolbar: Kelime Ekle -->
<div class="reader-toolbar left-toolbar">
  <button onclick="openAddWordModal()" title="Kelime Ekle">📌<span class="toolbar-label">Kelime Ekle</span></button>
</div>

<!-- Sağ toolbar: Font & Tema -->
<div class="reader-toolbar right-toolbar">
  <button onclick="increaseFont()">A+</button>
  <button onclick="decreaseFont()">A-</button>
  <button onclick="toggleDark()">🌙</button>
</div>

<div class="back-bar">
  <button onclick="goBack()">← Geri Dön</button>
</div>

<!-- Kelime Ekleme Modalı -->
<div class="word-modal-overlay" id="wordModalOverlay">
  <div class="word-modal">
    <div class="word-modal-header">
      <span>📌 Kelime Ekle</span>
      <button class="word-modal-close" onclick="closeAddWordModal()">✕</button>
    </div>
    <div class="word-modal-word" id="modalWordDisplay">—</div>

    <!-- Temel form önerisi (gehe → gehen) -->
    <div id="modalBaseFormWrap" style="display:none;align-items:center;justify-content:space-between;gap:8px;padding:8px 12px;background:rgba(201,168,76,0.06);border:1px solid rgba(201,168,76,0.18);border-radius:8px;margin-bottom:4px;font-size:12px;color:#aaa;">
      <span>Temel form: <strong id="modalBaseFormText" style="color:#e2e8f0;font-family:monospace;"></strong></span>
      <button onclick="applyModalBaseForm()" style="padding:3px 9px;background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.3);border-radius:6px;color:#c9a84c;font-size:11px;font-weight:600;cursor:pointer;">kullan →</button>
    </div>

    <input
      type="text"
      id="modalMeaningInput"
      class="word-modal-input"
      placeholder="Türkçe anlamını gir..."
      autocomplete="off"
    />
    <!-- Mevcut input'un hemen altına, word-modal-actions'ın üstüne ekle -->
    <div class="word-modal-tags">
      <div class="tag-label">Etiket (opsiyonel)</div>
      <div class="tag-chips" id="modalTagChips">
        <button type="button" class="tag-chip" data-tag="fiil">fiil</button>
        <button type="button" class="tag-chip" data-tag="isim">isim</button>
        <button type="button" class="tag-chip" data-tag="sıfat">sıfat</button>
        <button type="button" class="tag-chip" data-tag="zarf">zarf</button>
        <button type="button" class="tag-chip" data-tag="B1">B1</button>
        <button type="button" class="tag-chip" data-tag="B2">B2</button>
        <button type="button" class="tag-chip" data-tag="seyahat">seyahat</button>
        <button type="button" class="tag-chip" data-tag="iş">iş</button>
      </div>
    </div>
    <div class="word-modal-actions">
      <button class="word-modal-cancel" onclick="closeAddWordModal()">İptal</button>
      <button class="word-modal-save" onclick="saveWordFromModal()">Kaydet ✓</button>
    </div>
  </div>
</div>

<script type="module">
  import "../js/core.js";
  window.requireAuth();
  window.loadNavbar();
</script>
<script type="module" src="../js/okuma.js"></script>

</body>
</html>
