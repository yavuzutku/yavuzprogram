<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yeni Metin</title>

<link href="https://fonts.googleapis.com/css2?family=Inter&family=Roboto&family=Playfair+Display&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/metin.css">

</head>
<body>

<div class="navbar">
  Almanca Metin Editörü
</div>
<div class="bottom-action">
  <button id="goReadBtn">📖 Metni Oku</button>
</div>
<div class="toolbar">

  <select id="fontSelector">
    <option value="Inter">Inter</option>
    <option value="Roboto">Roboto</option>
    <option value="Playfair Display">Playfair</option>
  </select>

  <button data-cmd="bold">B</button>
  <button data-cmd="underline">U</button>

  <button data-align="left">Sol</button>
  <button data-align="center">Ortala</button>
  <button data-align="right">Sağ</button>

  <button id="increaseSize">A+</button>
  <button id="decreaseSize">A-</button>

  <input type="color" id="textColor">
  <input type="color" id="highlightColor">

</div>

<div class="editor">
  <div id="textArea" contenteditable="true">
    Almanca metninizi buraya yapıştırın...
  </div>
</div>

<script src="js/metin.js"></script>

<!-- Auth koruma -->
<script src="js/core.js"></script>
<script>
requireAuth();
</script>

</body>
</html>
