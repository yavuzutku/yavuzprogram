<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kelimelerim — AlmancaPratik</title>
  <meta name="description" content="Kaydettiğin Almanca kelimeleri listele, filtrele, düzenle ve tekrar et. Kendi kelime bankanı oluştur.">
  <link rel="icon" href="../favicon.ico">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/kelimeler.css">
</head>
<body>

<div class="page-wrapper">

  <div class="top-bar">
    <!-- DÜZELTME: ../index.html → ../anasayfa/ -->
    <button class="back-btn" onclick="window.location.href='../anasayfa/'">← Geri</button>
    <h1 class="page-title">📖 Kelimelerim</h1>
    <div class="word-count-badge" id="wordCountBadge">0 kelime</div>
  </div>

  <div class="search-bar">
    <input
      type="text"
      id="searchInput"
      placeholder="Kelime ara..."
      autocomplete="off"
    />
  </div>

  <div class="content-layout">

    <aside class="filter-sidebar">
      <div class="filter-sidebar-title">Etiketler</div>
      <div class="filter-tag-list" id="filterTagList"></div>
    </aside>

    <div class="word-list-area">
      <div class="word-list" id="wordList">
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">📭</div>
          <div class="empty-title">Henüz kelime eklenmedi</div>
          <div class="empty-desc">Okuma sırasında bir kelime seçip 📌 Kelime Ekle butonuna basarak buraya kaydedebilirsin.</div>
        </div>
      </div>
    </div>

  </div>

</div>

<script type="module">
  import "../js/core.js";
  window.loadNavbar();
  import { initAuthWall } from '../src/components/authWall.js';
  initAuthWall({
    icon:     '📖',
    title:    'Kelimelerini görmek için giriş yap',
    desc:     'Kaydettiğin tüm Almanca kelimelerin, etiketlerin ve istatistiklerin seni bekliyor.',
    features: ['Sınırsız kelime', 'Etiket sistemi', 'Arama & filtreleme'],
    backHref: '../anasayfa/'
  });
</script>
<script type="module" src="../js/kelimeler.js"></script>

</body>
</html>
